<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俯视角动作冒险游戏</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #ecf0f1;
            margin-bottom: 20px;
        }

        #gameCanvas {
            border: 4px solid #34495e;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .controls {
            margin-top: 20px;
            padding: 15px 25px;
            background-color: #34495e;
            border-radius: 8px;
            color: #ecf0f1;
        }

        .controls h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #3498db;
        }

        .controls ul {
            margin: 0;
            padding-left: 20px;
        }

        .controls li {
            margin: 5px 0;
        }

        .hint {
            margin-top: 15px;
            padding: 10px;
            background-color: #e74c3c;
            border-radius: 5px;
            color: white;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🏰 地牢逃生</h1>
    <canvas id="gameCanvas"></canvas>
    
    <div class="controls">
        <h3>🎮 操作说明</h3>
        <ul>
            <li><strong>方向键 / WASD</strong> - 移动角色</li>
            <li><strong>空格键</strong> - 近战攻击（半圆形范围）</li>
            <li><strong>E 键</strong> - 与门交互（需要钥匙）</li>
        </ul>
        <div class="hint">
            💡 提示：击败骷髅敌人后钥匙才会出现，拿到钥匙后靠近门按 E 键开门逃离！
        </div>
    </div>

    <script src="map.js"></script>
    <script src="player.js"></script>
    <script src="enemy.js"></script>
    <script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>魔法符文之战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }
        .header {
            text-align: center;
            padding: 15px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .header h1 {
            font-size: 2em;
            text-shadow: 0 0 20px #8b5cf6, 0 0 40px #8b5cf6;
            background: linear-gradient(45deg, #8b5cf6, #06b6d4, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 15px;
        }
        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
        .battle-area {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid rgba(139, 92, 246, 0.3);
        }
        .enemy-panel {
            text-align: center;
            margin-bottom: 20px;
        }
        .enemy-name {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: #f43f5e;
        }
        .health-bar-container {
            width: 100%;
            height: 30px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #f43f5e;
        }
        .health-bar {
            height: 100%;
            background: linear-gradient(90deg, #ef4444, #f43f5e);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .enemy-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.9em;
        }
        .stat-item {
            padding: 5px 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        .weakness {
            color: #fbbf24;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            max-height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, rgba(0,0,0,0.8) 70%);
            border-radius: 50%;
            border: 3px solid rgba(139, 92, 246, 0.5);
            margin: 20px auto;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3), inset 0 0 50px rgba(139, 92, 246, 0.1);
        }
        #runeCanvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .magic-circle-decoration {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            border: 2px dashed rgba(139, 92, 246, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .panel {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid rgba(139, 92, 246, 0.3);
        }
        .panel-title {
            font-size: 1.1em;
            margin-bottom: 10px;
            color: #a78bfa;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            padding-bottom: 8px;
        }
        .element-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .element-btn {
            padding: 10px 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: bold;
            transition: all 0.3s ease;
            opacity: 0.7;
        }
        .element-btn.active {
            opacity: 1;
            transform: scale(1.1);
            box-shadow: 0 0 15px currentColor;
        }
        .element-btn.fire { background: linear-gradient(135deg, #ef4444, #f97316); color: white; }
        .element-btn.water { background: linear-gradient(135deg, #3b82f6, #06b6d4); color: white; }
        .element-btn.wind { background: linear-gradient(135deg, #22c55e, #84cc16); color: white; }
        .element-btn.earth { background: linear-gradient(135deg, #a16207, #78716c); color: white; }
        .match-display {
            text-align: center;
        }
        .match-bar-container {
            width: 100%;
            height: 25px;
            background: rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
            margin: 10px 0;
        }
        .match-bar {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #84cc16);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .spell-name {
            font-size: 1.2em;
            color: #fbbf24;
            min-height: 30px;
        }
        .combo-display {
            margin-top: 10px;
            padding: 8px;
            background: rgba(251, 191, 36, 0.2);
            border-radius: 8px;
            border: 1px solid #fbbf24;
        }
        .battle-log {
            flex: 1;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-content {
            font-size: 0.85em;
            line-height: 1.6;
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .log-player { color: #8b5cf6; }
        .log-enemy { color: #f43f5e; }
        .log-damage { color: #fbbf24; }
        .log-heal { color: #22c55e; }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-end-turn {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
        }
        .btn-end-turn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.5);
        }
        .btn-clear {
            background: rgba(100,100,100,0.5);
            color: white;
        }
        .damage-formula {
            font-size: 0.75em;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            line-height: 1.5;
        }
        .status-effects {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .status-effect {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.7em;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .effect-burn { background: #ef4444; }
        .effect-slow { background: #3b82f6; }
        .effect-break { background: #22c55e; }
        .effect-stun { background: #a16207; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🔮 魔法符文之战 🔮</h1>
        </div>
        
        <div class="main-layout">
            <div class="battle-area">
                <div class="enemy-panel">
                    <div class="enemy-name">🗿 元素魔像</div>
                    <div class="health-bar-container">
                        <div class="health-bar" id="enemyHealthBar" style="width: 100%">
                            <span id="enemyHealthText">100 / 100</span>
                        </div>
                    </div>
                    <div class="enemy-stats">
                        <div class="stat-item">⚔️ 攻击: <span id="enemyAttack">15</span></div>
                        <div class="stat-item weakness">💀 弱点: <span id="enemyWeakness">火系</span></div>
                    </div>
                    <div class="status-effects" id="enemyStatusEffects"></div>
                </div>
                
                <div class="canvas-container">
                    <div class="magic-circle-decoration"></div>
                    <canvas id="runeCanvas"></canvas>
                </div>
                
                <div class="action-buttons">
                    <button class="btn btn-clear" id="clearBtn">清除绘制</button>
                    <button class="btn btn-end-turn" id="endTurnBtn">结束回合</button>
                </div>
                
                <div class="damage-formula panel">
                    <div class="panel-title">📐 伤害计算公式</div>
                    <div>最终伤害 = 基础威力 × (匹配度/100) × 元素加成 × 弱点加成 × 连携加成</div>
                    <div style="margin-top: 5px; font-size: 0.9em;">
                        元素加成: 同系+50% | 弱点+100% | 连携: 每多一个咒语+20%
                    </div>
                </div>
            </div>
            
            <div class="side-panel">
                <div class="panel">
                    <div class="panel-title">🌟 元素亲和力</div>
                    <div class="element-selector">
                        <button class="element-btn fire active" data-element="fire">🔥 火</button>
                        <button class="element-btn water" data-element="water">💧 水</button>
                        <button class="element-btn wind" data-element="wind">🌪️ 风</button>
                        <button class="element-btn earth" data-element="earth">🪨 土</button>
                    </div>
                </div>
                
                <div class="panel match-display">
                    <div class="panel-title">✨ 咒语识别</div>
                    <div class="spell-name" id="spellName">等待绘制符文...</div>
                    <div class="match-bar-container">
                        <div class="match-bar" id="matchBar" style="width: 0%">
                            <span id="matchPercent">0%</span>
                        </div>
                    </div>
                    <div class="combo-display" id="comboDisplay" style="display: none;">
                        🔥 连携计数: <span id="comboCount">0</span> | 加成: <span id="comboBonus">0%</span>
                    </div>
                </div>
                
                <div class="panel battle-log">
                    <div class="panel-title">📜 战斗日志</div>
                    <div class="log-content" id="battleLog"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ElementSystem = {
            elements: {
                fire: {
                    name: '火系',
                    color: '#ef4444',
                    gradient: ['#ef4444', '#f97316'],
                    damageBonus: 1.5,
                    effect: 'burn',
                    effectName: '灼烧',
                    effectChance: 0.3
                },
                water: {
                    name: '水系',
                    color: '#3b82f6',
                    gradient: ['#3b82f6', '#06b6d4'],
                    damageBonus: 1.3,
                    effect: 'slow',
                    effectName: '减速',
                    effectChance: 0.4
                },
                wind: {
                    name: '风系',
                    color: '#22c55e',
                    gradient: ['#22c55e', '#84cc16'],
                    damageBonus: 1.2,
                    effect: 'break',
                    effectName: '破甲',
                    effectChance: 0.35
                },
                earth: {
                    name: '土系',
                    color: '#a16207',
                    gradient: ['#a16207', '#78716c'],
                    damageBonus: 1.4,
                    effect: 'stun',
                    effectName: '眩晕',
                    effectChance: 0.25
                }
            },
            
            getElement(element) {
                return this.elements[element] || this.elements.fire;
            },
            
            getElementColor(element) {
                return this.getElement(element).color;
            },
            
            getWeaknessMultiplier(attackElement, weaknessElement) {
                const counters = {
                    fire: 'wind',
                    water: 'fire',
                    wind: 'earth',
                    earth: 'water'
                };
                return counters[attackElement] === weaknessElement ? 2.0 : 1.0;
            }
        };

        class SpellRecognizer {
            constructor() {
                this.templates = this.initializeTemplates();
            }
            
            initializeTemplates() {
                return [
                    { name: '火焰冲击', type: 'horizontal_line', power: 20, generate: this.generateHorizontalLine },
                    { name: '寒冰箭', type: 'vertical_line', power: 18, generate: this.generateVerticalLine },
                    { name: '火球术', type: 'circle', power: 35, generate: this.generateCircle },
                    { name: '风刃三角', type: 'triangle', power: 30, generate: this.generateTriangle },
                    { name: '岩石刺', type: 'zigzag', power: 25, generate: this.generateZigzag },
                    { name: '弧形护盾', type: 'arc', power: 22, generate: this.generateArc },
                    { name: '闪电链', type: 'diagonal_right', power: 28, generate: this.generateDiagonalRight },
                    { name: '冰霜新星', type: 'diagonal_left', power: 26, generate: this.generateDiagonalLeft },
                    { name: '地震波', type: 'square', power: 40, generate: this.generateSquare },
                    { name: '旋风斩', type: 'spiral', power: 32, generate: this.generateSpiral },
                    { name: '十字斩', type: 'cross', power: 38, generate: this.generateCross },
                    { name: '星辰陨落', type: 'star', power: 45, generate: this.generateStar }
                ];
            }
            
            generateHorizontalLine(size = 100) {
                const points = [];
                const center = size / 2;
                for (let x = size * 0.2; x <= size * 0.8; x += 2) {
                    points.push({ x, y: center });
                }
                return points;
            }
            
            generateVerticalLine(size = 100) {
                const points = [];
                const center = size / 2;
                for (let y = size * 0.2; y <= size * 0.8; y += 2) {
                    points.push({ x: center, y });
                }
                return points;
            }
            
            generateCircle(size = 100) {
                const points = [];
                const center = size / 2;
                const radius = size * 0.3;
                for (let angle = 0; angle < Math.PI * 2; angle += 0.1) {
                    points.push({
                        x: center + radius * Math.cos(angle),
                        y: center + radius * Math.sin(angle)
                    });
                }
                return points;
            }
            
            generateTriangle(size = 100) {
                const points = [];
                const center = size / 2;
                const height = size * 0.35;
                const vertices = [
                    { x: center, y: center - height },
                    { x: center - height * 0.866, y: center + height * 0.5 },
                    { x: center + height * 0.866, y: center + height * 0.5 },
                    { x: center, y: center - height }
                ];
                for (let i = 0; i < vertices.length - 1; i++) {
                    const start = vertices[i];
                    const end = vertices[i + 1];
                    const steps = 30;
                    for (let t = 0; t <= 1; t += 1 / steps) {
                        points.push({
                            x: start.x + (end.x - start.x) * t,
                            y: start.y + (end.y - start.y) * t
                        });
                    }
                }
                return points;
            }
            
            generateZigzag(size = 100) {
                const points = [];
                const startX = size * 0.2;
                const endX = size * 0.8;
                const centerY = size / 2;
                const amplitude = size * 0.15;
                const segments = 4;
                const segmentWidth = (endX - startX) / segments;
                for (let i = 0; i < segments; i++) {
                    const segStartX = startX + i * segmentWidth;
                    const segEndX = segStartX + segmentWidth;
                    const yOffset = (i % 2 === 0) ? -amplitude : amplitude;
                    const steps = 15;
                    for (let t = 0; t <= 1; t += 1 / steps) {
                        points.push({
                            x: segStartX + (segEndX - segStartX) * t,
                            y: centerY + yOffset * (1 - Math.abs(2 * t - 1))
                        });
                    }
                }
                return points;
            }
            
            generateArc(size = 100) {
                const points = [];
                const center = size / 2;
                const radius = size * 0.3;
                for (let angle = Math.PI; angle < Math.PI * 2; angle += 0.1) {
                    points.push({
                        x: center + radius * Math.cos(angle),
                        y: center + radius * Math.sin(angle)
                    });
                }
                return points;
            }
            
            generateDiagonalRight(size = 100) {
                const points = [];
                for (let i = 0; i <= 1; i += 0.02) {
                    points.push({
                        x: size * 0.2 + size * 0.6 * i,
                        y: size * 0.2 + size * 0.6 * i
                    });
                }
                return points;
            }
            
            generateDiagonalLeft(size = 100) {
                const points = [];
                for (let i = 0; i <= 1; i += 0.02) {
                    points.push({
                        x: size * 0.8 - size * 0.6 * i,
                        y: size * 0.2 + size * 0.6 * i
                    });
                }
                return points;
            }
            
            generateSquare(size = 100) {
                const points = [];
                const min = size * 0.25;
                const max = size * 0.75;
                const edges = [
                    { start: { x: min, y: min }, end: { x: max, y: min } },
                    { start: { x: max, y: min }, end: { x: max, y: max } },
                    { start: { x: max, y: max }, end: { x: min, y: max } },
                    { start: { x: min, y: max }, end: { x: min, y: min } }
                ];
                edges.forEach(edge => {
                    const steps = 25;
                    for (let t = 0; t <= 1; t += 1 / steps) {
                        points.push({
                            x: edge.start.x + (edge.end.x - edge.start.x) * t,
                            y: edge.start.y + (edge.end.y - edge.start.y) * t
                        });
                    }
                });
                return points;
            }
            
            generateSpiral(size = 100) {
                const points = [];
                const center = size / 2;
                const turns = 2;
                const maxRadius = size * 0.3;
                for (let angle = 0; angle < Math.PI * 2 * turns; angle += 0.1) {
                    const radius = (angle / (Math.PI * 2 * turns)) * maxRadius;
                    points.push({
                        x: center + radius * Math.cos(angle),
                        y: center + radius * Math.sin(angle)
                    });
                }
                return points;
            }
            
            generateCross(size = 100) {
                const points = [];
                const center = size / 2;
                const length = size * 0.3;
                for (let i = -1; i <= 1; i += 0.05) {
                    points.push({ x: center + length * i, y: center });
                }
                for (let i = -1; i <= 1; i += 0.05) {
                    points.push({ x: center, y: center + length * i });
                }
                return points;
            }
            
            generateStar(size = 100) {
                const points = [];
                const center = size / 2;
                const outerRadius = size * 0.35;
                const innerRadius = size * 0.15;
                const pointsCount = 5;
                for (let i = 0; i < pointsCount * 2; i++) {
                    const angle = (i * Math.PI) / pointsCount - Math.PI / 2;
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const startX = center + (i === 0 ? outerRadius : innerRadius) * Math.cos((i - 1) * Math.PI / pointsCount - Math.PI / 2);
                    const startY = center + (i === 0 ? outerRadius : innerRadius) * Math.sin((i - 1) * Math.PI / pointsCount - Math.PI / 2);
                    const endX = center + radius * Math.cos(angle);
                    const endY = center + radius * Math.sin(angle);
                    const steps = 15;
                    for (let t = 0; t <= 1; t += 1 / steps) {
                        points.push({
                            x: startX + (endX - startX) * t,
                            y: startY + (endY - startY) * t
                        });
                    }
                }
                return points;
            }
            
            normalizePoints(points, size = 100) {
                if (points.length < 2) return [];
                let minX = Infinity, maxX = -Infinity;
                let minY = Infinity, maxY = -Infinity;
                points.forEach(p => {
                    minX = Math.min(minX, p.x);
                    maxX = Math.max(maxX, p.x);
                    minY = Math.min(minY, p.y);
                    maxY = Math.max(maxY, p.y);
                });
                const width = maxX - minX || 1;
                const height = maxY - minY || 1;
                const scale = Math.min(size / width, size / height) * 0.8;
                const offsetX = (size - width * scale) / 2 - minX * scale;
                const offsetY = (size - height * scale) / 2 - minY * scale;
                return points.map(p => ({
                    x: p.x * scale + offsetX,
                    y: p.y * scale + offsetY
                }));
            }
            
            resamplePoints(points, numPoints = 50) {
                if (points.length < 2) return [];
                const result = [];
                let totalLength = 0;
                const lengths = [0];
                for (let i = 1; i < points.length; i++) {
                    const dx = points[i].x - points[i - 1].x;
                    const dy = points[i].y - points[i - 1].y;
                    totalLength += Math.sqrt(dx * dx + dy * dy);
                    lengths.push(totalLength);
                }
                const step = totalLength / (numPoints - 1);
                let currentLength = 0;
                let j = 0;
                for (let i = 0; i < numPoints; i++) {
                    while (j < lengths.length - 1 && lengths[j + 1] < currentLength) {
                        j++;
                    }
                    if (j >= points.length - 1) {
                        result.push({ ...points[points.length - 1] });
                    } else {
                        const t = (currentLength - lengths[j]) / (lengths[j + 1] - lengths[j] || 1);
                        result.push({
                            x: points[j].x + (points[j + 1].x - points[j].x) * t,
                            y: points[j].y + (points[j + 1].y - points[j].y) * t
                        });
                    }
                    currentLength += step;
                }
                return result;
            }
            
            calculateDistance(points1, points2) {
                if (points1.length !== points2.length || points1.length === 0) return Infinity;
                let totalDistance = 0;
                for (let i = 0; i < points1.length; i++) {
                    const dx = points1[i].x - points2[i].x;
                    const dy = points1[i].y - points2[i].y;
                    totalDistance += Math.sqrt(dx * dx + dy * dy);
                }
                return totalDistance / points1.length;
            }
            
            recognize(points) {
                const startTime = performance.now();
                if (points.length < 10) {
                    return { match: null, score: 0, elapsed: performance.now() - startTime };
                }
                const normalized = this.normalizePoints(points);
                const resampled = this.resamplePoints(normalized);
                if (resampled.length < 10) {
                    return { match: null, score: 0, elapsed: performance.now() - startTime };
                }
                let bestMatch = null;
                let bestScore = 0;
                const maxDistance = 50;
                this.templates.forEach(template => {
                    const templatePoints = this.resamplePoints(template.generate(100));
                    if (templatePoints.length === resampled.length) {
                        const distance = this.calculateDistance(resampled, templatePoints);
                        const score = Math.max(0, Math.min(100, (1 - distance / maxDistance) * 100));
                        if (score > bestScore) {
                            bestScore = score;
                            bestMatch = template;
                        }
                    }
                });
                const elapsed = performance.now() - startTime;
                console.log(`咒语识别耗时: ${elapsed.toFixed(2)}ms`);
                return {
                    match: bestScore > 30 ? bestMatch : null,
                    score: bestScore,
                    elapsed
                };
            }
        }

        class BattleManager {
            constructor() {
                this.playerElement = 'fire';
                this.playerCombo = [];
                this.comboCount = 0;
                this.enemy = {
                    maxHealth: 100,
                    health: 100,
                    attack: 15,
                    weakness: 'fire',
                    statusEffects: []
                };
                this.turn = 1;
                this.isPlayerTurn = true;
                this.spellRecognizer = new SpellRecognizer();
                this.uiManager = null;
            }
            
            init(uiManager) {
                this.uiManager = uiManager;
                this.setEnemyWeakness();
                this.addLog('战斗开始！绘制符文施放咒语吧！', 'log-player');
            }
            
            setEnemyWeakness() {
                const elements = ['fire', 'water', 'wind', 'earth'];
                this.enemy.weakness = elements[Math.floor(Math.random() * elements.length)];
                this.uiManager.updateEnemyWeakness(ElementSystem.getElement(this.enemy.weakness).name);
            }
            
            setPlayerElement(element) {
                this.playerElement = element;
            }
            
            castSpell(points) {
                if (!this.isPlayerTurn) return null;
                const result = this.spellRecognizer.recognize(points);
                if (result.match && result.score >= 40) {
                    this.playerCombo.push({
                        spell: result.match,
                        score: result.score,
                        element: this.playerElement
                    });
                    this.comboCount = this.playerCombo.length;
                    this.addLog(`绘制完成: ${result.match.name} (匹配度: ${result.score.toFixed(0)}%)`, 'log-player');
                    return result;
                }
                if (result.score > 0) {
                    this.addLog(`绘制失败: 匹配度仅为 ${result.score.toFixed(0)}%, 需要至少40%`, 'log-player');
                }
                return result;
            }
            
            calculateDamage(spell, matchScore, element) {
                const basePower = spell.power;
                const matchMultiplier = matchScore / 100;
                const elementData = ElementSystem.getElement(element);
                const elementBonus = elementData.damageBonus;
                const weaknessBonus = ElementSystem.getWeaknessMultiplier(element, this.enemy.weakness);
                const comboBonus = 1 + (this.playerCombo.length - 1) * 0.2;
                const damage = Math.floor(basePower * matchMultiplier * elementBonus * weaknessBonus * comboBonus);
                return {
                    damage,
                    breakdown: {
                        basePower,
                        matchMultiplier,
                        elementBonus,
                        weaknessBonus,
                        comboBonus
                    }
                };
            }
            
            applyStatusEffect(element) {
                const elementData = ElementSystem.getElement(element);
                if (Math.random() < elementData.effectChance) {
                    const existing = this.enemy.statusEffects.find(e => e.type === elementData.effect);
                    if (existing) {
                        existing.duration = 3;
                    } else {
                        this.enemy.statusEffects.push({
                            type: elementData.effect,
                            name: elementData.effectName,
                            duration: 3
                        });
                    }
                    this.addLog(`附加效果: ${elementData.effectName}!`, 'log-damage');
                }
            }
            
            processStatusEffects() {
                let damage = 0;
                let skipTurn = false;
                this.enemy.statusEffects = this.enemy.statusEffects.filter(effect => {
                    if (effect.type === 'burn') {
                        damage += 5;
                        this.addLog(`灼烧伤害: 5点`, 'log-damage');
                    }
                    if (effect.type === 'stun' && effect.duration === 3) {
                        skipTurn = true;
                        this.addLog(`魔像被眩晕，本回合无法行动!`, 'log-damage');
                    }
                    effect.duration--;
                    return effect.duration > 0;
                });
                if (damage > 0) {
                    this.enemy.health = Math.max(0, this.enemy.health - damage);
                }
                return { damage, skipTurn };
            }
            
            getEnemyAttack() {
                let attack = this.enemy.attack;
                const slowEffect = this.enemy.statusEffects.find(e => e.type === 'slow');
                const breakEffect = this.enemy.statusEffects.find(e => e.type === 'break');
                if (slowEffect) {
                    attack = Math.floor(attack * 0.7);
                }
                if (breakEffect) {
                    attack = Math.floor(attack * 0.6);
                }
                return attack;
            }
            
            endPlayerTurn() {
                if (!this.isPlayerTurn) return;
                if (this.playerCombo.length === 0) {
                    this.addLog('本回合未施放任何咒语', 'log-player');
                } else {
                    let totalDamage = 0;
                    this.playerCombo.forEach((combo, index) => {
                        const result = this.calculateDamage(combo.spell, combo.score, combo.element);
                        totalDamage += result.damage;
                        if (index === 0) {
                            this.addLog(
                                `伤害计算: ${combo.spell.power} × ${(combo.score/100).toFixed(2)} × ${result.breakdown.elementBonus.toFixed(1)} × ${result.breakdown.weaknessBonus.toFixed(1)} × ${result.breakdown.comboBonus.toFixed(1)} = ${result.damage}`,
                                'log-damage'
                            );
                        }
                        this.applyStatusEffect(combo.element);
                    });
                    this.enemy.health = Math.max(0, this.enemy.health - totalDamage);
                    this.addLog(`总伤害: ${totalDamage}点!`, 'log-damage');
                    if (this.playerCombo.length > 1) {
                        this.addLog(`🔥 ${this.playerCombo.length}连携! 伤害加成${((this.playerCombo.length - 1) * 20)}%`, 'log-damage');
                    }
                }
                this.playerCombo = [];
                this.comboCount = 0;
                this.uiManager.updateEnemyHealth(this.enemy.health, this.enemy.maxHealth);
                this.uiManager.updateStatusEffects(this.enemy.statusEffects);
                if (this.enemy.health <= 0) {
                    this.addLog('🎉 胜利! 元素魔像被击败了!', 'log-heal');
                    this.uiManager.showVictory();
                    return;
                }
                this.isPlayerTurn = false;
                this.enemyTurn();
            }
            
            enemyTurn() {
                setTimeout(() => {
                    const { skipTurn } = this.processStatusEffects();
                    this.uiManager.updateEnemyHealth(this.enemy.health, this.enemy.maxHealth);
                    this.uiManager.updateStatusEffects(this.enemy.statusEffects);
                    if (this.enemy.health <= 0) {
                        this.addLog('🎉 胜利! 元素魔像被击败了!', 'log-heal');
                        this.uiManager.showVictory();
                        return;
                    }
                    if (!skipTurn) {
                        const damage = this.getEnemyAttack();
                        this.addLog(`魔像发动攻击! 造成 ${damage} 点伤害`, 'log-enemy');
                    }
                    this.turn++;
                    this.isPlayerTurn = true;
                    this.addLog(`--- 第 ${this.turn} 回合 ---`, 'log-player');
                    this.uiManager.updateComboDisplay(0, 0);
                    this.uiManager.clearSpellDisplay();
                }, 1000);
            }
            
            resetBattle() {
                this.enemy.health = this.enemy.maxHealth;
                this.enemy.statusEffects = [];
                this.playerCombo = [];
                this.comboCount = 0;
                this.turn = 1;
                this.isPlayerTurn = true;
                this.setEnemyWeakness();
                this.uiManager.updateEnemyHealth(this.enemy.health, this.enemy.maxHealth);
                this.uiManager.updateStatusEffects([]);
                this.uiManager.clearLog();
                this.addLog('新的战斗开始！', 'log-player');
            }
            
            addLog(message, className = '') {
                this.uiManager.addLog(message, className);
            }
        }

        class UIManager {
            constructor() {
                this.canvas = document.getElementById('runeCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.isDrawing = false;
                this.currentPath = [];
                this.currentElement = 'fire';
                this.battleManager = null;
                this.fadeAnimation = null;
                this.init();
            }
            
            init() {
                this.setupCanvas();
                this.setupEventListeners();
                this.updateElementColor();
            }
            
            setupCanvas() {
                const resize = () => {
                    const container = this.canvas.parentElement;
                    const rect = container.getBoundingClientRect();
                    const dpr = window.devicePixelRatio || 1;
                    this.canvas.width = rect.width * dpr;
                    this.canvas.height = rect.height * dpr;
                    this.ctx.scale(dpr, dpr);
                    this.canvas.style.width = rect.width + 'px';
                    this.canvas.style.height = rect.height + 'px';
                };
                resize();
                window.addEventListener('resize', resize);
            }
            
            setupEventListeners() {
                this.canvas.addEventListener('mousedown', (e) => this.startDrawing(e));
                this.canvas.addEventListener('mousemove', (e) => this.draw(e));
                this.canvas.addEventListener('mouseup', () => this.endDrawing());
                this.canvas.addEventListener('mouseleave', () => this.endDrawing());
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.startDrawing(e.touches[0]);
                }, { passive: false });
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    this.draw(e.touches[0]);
                }, { passive: false });
                this.canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.endDrawing();
                }, { passive: false });
                document.querySelectorAll('.element-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.element-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentElement = btn.dataset.element;
                        this.battleManager.setPlayerElement(this.currentElement);
                        this.updateElementColor();
                    });
                });
                document.getElementById('clearBtn').addEventListener('click', () => this.clearCanvas());
                document.getElementById('endTurnBtn').addEventListener('click', () => {
                    this.battleManager.endPlayerTurn();
                    this.clearCanvas();
                });
            }
            
            getCanvasCoords(e) {
                const rect = this.canvas.getBoundingClientRect();
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            }
            
            startDrawing(e) {
                if (!this.battleManager.isPlayerTurn) return;
                this.isDrawing = true;
                this.currentPath = [];
                const coords = this.getCanvasCoords(e);
                this.currentPath.push(coords);
                this.ctx.beginPath();
                this.ctx.moveTo(coords.x, coords.y);
                this.ctx.strokeStyle = ElementSystem.getElementColor(this.currentElement);
                this.ctx.lineWidth = 4;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                this.ctx.shadowColor = ElementSystem.getElementColor(this.currentElement);
                this.ctx.shadowBlur = 10;
            }
            
            draw(e) {
                if (!this.isDrawing) return;
                const coords = this.getCanvasCoords(e);
                this.currentPath.push(coords);
                this.ctx.lineTo(coords.x, coords.y);
                this.ctx.stroke();
                this.ctx.beginPath();
                this.ctx.moveTo(coords.x, coords.y);
            }
            
            endDrawing() {
                if (!this.isDrawing) return;
                this.isDrawing = false;
                if (this.currentPath.length > 5) {
                    const result = this.battleManager.castSpell(this.currentPath);
                    if (result) {
                        this.updateSpellDisplay(result);
                        this.updateComboDisplay(this.battleManager.comboCount, (this.battleManager.comboCount - 1) * 20);
                        this.animateFade();
                    } else {
                        this.clearCanvas();
                    }
                } else {
                    this.clearCanvas();
                }
            }
            
            animateFade() {
                let alpha = 1;
                const animate = () => {
                    alpha -= 0.05;
                    if (alpha <= 0) {
                        this.clearCanvas();
                        return;
                    }
                    this.ctx.save();
                    this.ctx.globalAlpha = alpha;
                    this.ctx.filter = `brightness(${1 + (1 - alpha) * 2})`;
                    this.ctx.restore();
                    this.fadeAnimation = requestAnimationFrame(animate);
                };
                animate();
            }
            
            clearCanvas() {
                if (this.fadeAnimation) {
                    cancelAnimationFrame(this.fadeAnimation);
                }
                this.ctx.clearRect(0, 0, this.canvas.width / (window.devicePixelRatio || 1), this.canvas.height / (window.devicePixelRatio || 1));
                this.currentPath = [];
            }
            
            updateElementColor() {
                const color = ElementSystem.getElementColor(this.currentElement);
                this.canvas.style.boxShadow = `0 0 30px ${color}40, inset 0 0 50px ${color}20`;
            }
            
            updateSpellDisplay(result) {
                const spellName = document.getElementById('spellName');
                const matchBar = document.getElementById('matchBar');
                const matchPercent = document.getElementById('matchPercent');
                if (result.match) {
                    spellName.textContent = `✨ ${result.match.name}`;
                    matchBar.style.width = `${result.score}%`;
                    matchPercent.textContent = `${result.score.toFixed(0)}%`;
                    if (result.score >= 80) {
                        matchBar.style.background = 'linear-gradient(90deg, #22c55e, #84cc16)';
                    } else if (result.score >= 50) {
                        matchBar.style.background = 'linear-gradient(90deg, #fbbf24, #f59e0b)';
                    } else {
                        matchBar.style.background = 'linear-gradient(90deg, #ef4444, #f97316)';
                    }
                } else {
                    spellName.textContent = '❌ 未识别';
                    matchBar.style.width = `${result.score}%`;
                    matchPercent.textContent = `${result.score.toFixed(0)}%`;
                }
            }
            
            clearSpellDisplay() {
                document.getElementById('spellName').textContent = '等待绘制符文...';
                document.getElementById('matchBar').style.width = '0%';
                document.getElementById('matchPercent').textContent = '0%';
            }
            
            updateComboDisplay(count, bonus) {
                const display = document.getElementById('comboDisplay');
                const countEl = document.getElementById('comboCount');
                const bonusEl = document.getElementById('comboBonus');
                if (count > 0) {
                    display.style.display = 'block';
                    countEl.textContent = count;
                    bonusEl.textContent = `${bonus}%`;
                } else {
                    display.style.display = 'none';
                }
            }
            
            updateEnemyHealth(current, max) {
                const bar = document.getElementById('enemyHealthBar');
                const text = document.getElementById('enemyHealthText');
                const percent = (current / max) * 100;
                bar.style.width = `${percent}%`;
                text.textContent = `${current} / ${max}`;
            }
            
            updateEnemyWeakness(weakness) {
                document.getElementById('enemyWeakness').textContent = weakness;
            }
            
            updateStatusEffects(effects) {
                const container = document.getElementById('enemyStatusEffects');
                container.innerHTML = '';
                const effectClasses = {
                    burn: 'effect-burn',
                    slow: 'effect-slow',
                    break: 'effect-break',
                    stun: 'effect-stun'
                };
                const effectIcons = {
                    burn: '🔥',
                    slow: '❄️',
                    break: '💨',
                    stun: '💫'
                };
                effects.forEach(effect => {
                    const el = document.createElement('span');
                    el.className = `status-effect ${effectClasses[effect.type]}`;
                    el.textContent = `${effectIcons[effect.type]} ${effect.name} (${effect.duration})`;
                    container.appendChild(el);
                });
            }
            
            addLog(message, className = '') {
                const log = document.getElementById('battleLog');
                const entry = document.createElement('div');
                entry.className = `log-entry ${className}`;
                entry.textContent = message;
                log.appendChild(entry);
                log.scrollTop = log.scrollHeight;
            }
            
            clearLog() {
                document.getElementById('battleLog').innerHTML = '';
            }
            
            showVictory() {
                setTimeout(() => {
                    if (confirm('🎉 胜利! 是否开始新的战斗?')) {
                        this.battleManager.resetBattle();
                    }
                }, 500);
            }
            
            setBattleManager(bm) {
                this.battleManager = bm;
            }
        }

        const Game = {
            init() {
                const uiManager = new UIManager();
                const battleManager = new BattleManager();
                uiManager.setBattleManager(battleManager);
                battleManager.init(uiManager);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            Game.init();
        });
    </script>

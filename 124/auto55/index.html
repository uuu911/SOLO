<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即时战略游戏 - 单位指挥与编队移动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        #gameContainer {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        #gameCanvas {
            border: 3px solid #16213e;
            border-radius: 8px;
            background: #2d3436;
            cursor: crosshair;
        }
        
        #uiPanel {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%);
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 20px;
            width: 280px;
            color: #eee;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        #uiPanel h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #e94560;
            border-bottom: 2px solid #0f3460;
            padding-bottom: 10px;
        }
        
        .section {
            margin-bottom: 20px;
        }
        
        .section h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #53a8b6;
        }
        
        .unit-info {
            background: rgba(15, 52, 96, 0.5);
            border-radius: 8px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .unit-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(83, 168, 182, 0.2);
        }
        
        .unit-item:last-child {
            border-bottom: none;
        }
        
        .unit-name {
            font-size: 12px;
            color: #bbe1fa;
        }
        
        .unit-health {
            font-size: 11px;
            color: #00ff88;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .formation-btn {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            border: 2px solid #53a8b6;
            color: #bbe1fa;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .formation-btn:hover {
            background: linear-gradient(135deg, #53a8b6 0%, #0f3460 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(83, 168, 182, 0.3);
        }
        
        .formation-btn.active {
            background: linear-gradient(135deg, #e94560 0%, #c73659 100%);
            border-color: #e94560;
        }
        
        .hotkey {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        #stopBtn {
            background: linear-gradient(135deg, #c73659 0%, #a31545 100%);
            border: 2px solid #e94560;
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        #stopBtn:hover {
            background: linear-gradient(135deg, #e94560 0%, #c73659 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
        }
        
        .stats {
            background: rgba(15, 52, 96, 0.5);
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        
        .stat-label {
            color: #7f8c8d;
        }
        
        .stat-value {
            color: #00ff88;
            font-weight: bold;
        }
        
        .instructions {
            font-size: 11px;
            color: #7f8c8d;
            line-height: 1.6;
        }
        
        .instructions p {
            margin-bottom: 5px;
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(15, 52, 96, 0.3);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #53a8b6;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="uiPanel">
            <h2>🎮 指挥面板</h2>
            
            <div class="section">
                <h3>📍 选中单位 (<span id="selectedCount">0</span>)</h3>
                <div class="unit-info" id="unitList">
                    <div style="color: #7f8c8d; font-size: 12px; text-align: center; padding: 20px;">
                        拖动鼠标框选单位
                    </div>
                </div>
            </div>
            
            <div class="section">
                <h3>🔄 阵型选择</h3>
                <div class="btn-group">
                    <button class="formation-btn active" data-formation="line">
                        横排阵型 <span class="hotkey">1</span>
                    </button>
                    <button class="formation-btn" data-formation="column">
                        纵列阵型 <span class="hotkey">2</span>
                    </button>
                    <button class="formation-btn" data-formation="wedge">
                        楔形阵型 <span class="hotkey">3</span>
                    </button>
                </div>
            </div>
            
            <div class="section">
                <button id="stopBtn">⏹ 停止所有指令 (S)</button>
            </div>
            
            <div class="section">
                <h3>📊 性能统计</h3>
                <div class="stats">
                    <div class="stat-row">
                        <span class="stat-label">FPS:</span>
                        <span class="stat-value" id="fpsDisplay">60</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">存活单位:</span>
                        <span class="stat-value" id="aliveUnits">15</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">当前阵型:</span>
                        <span class="stat-value" id="currentFormation">横排</span>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <h3>📖 操作说明</h3>
                <div class="instructions">
                    <p>• 左键拖动: 框选多个单位</p>
                    <p>• Shift+左键: 追加选择</p>
                    <p>• 右键空地: 移动至目标点</p>
                    <p>• 右键敌人: 攻击移动</p>
                    <p>• 数字键1-3: 切换阵型</p>
                    <p>• S键: 停止所有指令</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        class LineFormation {
            getOffset(index, total, spacing) {
                const halfWidth = (total - 1) * spacing / 2;
                return { x: index * spacing - halfWidth, y: 0 };
            }
        }

        class ColumnFormation {
            getOffset(index, total, spacing) {
                const halfHeight = (total - 1) * spacing / 2;
                return { x: 0, y: index * spacing - halfHeight };
            }
        }

        class WedgeFormation {
            getOffset(index, total, spacing) {
                if (index === 0) return { x: 0, y: 0 };
                const row = Math.floor((Math.sqrt(8 * index + 1) - 1) / 2);
                const posInRow = index - (row * (row + 1)) / 2;
                const rowWidth = row + 1;
                return {
                    x: (posInRow - rowWidth / 2 + 0.5) * spacing,
                    y: row * spacing
                };
            }
        }
    </script>

    <script>
        class Unit {
            constructor(x, y, isEnemy, unitType) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;
                this.maxSpeed = 2 + Math.random() * 2;
                this.speed = 0;
                this.maxHealth = 50 + Math.random() * 50;
                this.health = this.maxHealth;
                this.attack = 10;
                this.attackCooldown = 1000;
                this.lastAttackTime = 0;
                this.isSelected = false;
                this.isEnemy = isEnemy;
                this.radius = 10;
                this.angle = Math.random() * Math.PI * 2;
                this.angularVelocity = 0;
                this.velocityX = 0;
                this.velocityY = 0;
                this.acceleration = 0.5;
                this.isMoving = false;
                this.isAttacking = false;
                this.attackTarget = null;
                this.formationOffsetX = 0;
                this.formationOffsetY = 0;
                this.unitType = unitType;
                this.separationForce = 0.3;
            }

            moveTo(x, y) {
                this.targetX = x;
                this.targetY = y;
                this.isMoving = true;
                this.isAttacking = false;
                this.attackTarget = null;
            }

            stop() {
                this.targetX = this.x;
                this.targetY = this.y;
                this.isMoving = false;
                this.isAttacking = false;
                this.attackTarget = null;
                this.velocityX = 0;
                this.velocityY = 0;
                this.speed = 0;
            }

            attackTarget(target) {
                this.attackTarget = target;
                this.isAttacking = true;
                this.isMoving = true;
            }

            takeDamage(damage) {
                this.health -= damage;
                if (this.health < 0) this.health = 0;
            }

            update(deltaTime, allUnits) {
                if (this.health <= 0) return;

                if (this.attackTarget && this.attackTarget.health > 0) {
                    this.targetX = this.attackTarget.x;
                    this.targetY = this.attackTarget.y;
                } else if (this.attackTarget && this.attackTarget.health <= 0) {
                    this.attackTarget = null;
                    this.isAttacking = false;
                }

                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 1) {
                    const targetAngle = Math.atan2(dy, dx);
                    let angleDiff = targetAngle - this.angle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    this.angle += angleDiff * 0.1;

                    const targetSpeed = Math.min(this.maxSpeed, dist * 0.1);
                    if (this.speed < targetSpeed) {
                        this.speed = Math.min(this.speed + this.acceleration, targetSpeed);
                    } else {
                        this.speed = Math.max(this.speed - this.acceleration * 0.5, targetSpeed);
                    }

                    this.velocityX = Math.cos(this.angle) * this.speed;
                    this.velocityY = Math.sin(this.angle) * this.speed;

                    this.x += this.velocityX;
                    this.y += this.velocityY;

                    this.applySeparation(allUnits);
                } else {
                    this.speed *= 0.9;
                    if (this.speed < 0.1) {
                        this.speed = 0;
                        this.isMoving = false;
                    }
                }

                if (this.attackTarget && this.attackTarget.health > 0) {
                    const attackDist = Math.sqrt(
                        Math.pow(this.attackTarget.x - this.x, 2) + 
                        Math.pow(this.attackTarget.y - this.y, 2)
                    );
                    if (attackDist < this.radius + this.attackTarget.radius + 20) {
                        const now = Date.now();
                        if (now - this.lastAttackTime > this.attackCooldown) {
                            this.attackTarget.takeDamage(this.attack);
                            this.lastAttackTime = now;
                        }
                    }
                }
            }

            applySeparation(allUnits) {
                let sepX = 0;
                let sepY = 0;
                let count = 0;

                for (const unit of allUnits) {
                    if (unit.id === this.id || unit.health <= 0) continue;
                    const dx = this.x - unit.x;
                    const dy = this.y - unit.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = this.radius + unit.radius + 5;
                    
                    if (dist < minDist && dist > 0) {
                        const force = (minDist - dist) / dist * this.separationForce;
                        sepX += dx * force;
                        sepY += dy * force;
                        count++;
                    }
                }

                if (count > 0) {
                    this.x += sepX;
                    this.y += sepY;
                }
            }

            draw(ctx) {
                if (this.health <= 0) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                if (this.isSelected) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 8, 0, Math.PI * 2);
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.isEnemy ? '#ff4444' : '#4488ff';
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(this.radius, 0);
                ctx.lineTo(this.radius + 8, 0);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();

                const healthBarWidth = this.radius * 2;
                const healthBarHeight = 4;
                const healthPercent = this.health / this.maxHealth;
                
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x - healthBarWidth / 2, this.y - this.radius - 12, healthBarWidth, healthBarHeight);
                ctx.fillStyle = healthPercent > 0.5 ? '#00ff00' : healthPercent > 0.25 ? '#ffff00' : '#ff0000';
                ctx.fillRect(this.x - healthBarWidth / 2, this.y - this.radius - 12, healthBarWidth * healthPercent, healthBarHeight);
            }
        }

        class SelectionManager {
            constructor() {
                this.selectedUnits = [];
                this.isSelecting = false;
                this.selectionStartX = 0;
                this.selectionStartY = 0;
                this.selectionEndX = 0;
                this.selectionEndY = 0;
                this.isShiftPressed = false;
                this.previousSelection = new Set();
            }

            startSelection(x, y, isShiftPressed) {
                this.isSelecting = true;
                this.selectionStartX = x;
                this.selectionStartY = y;
                this.selectionEndX = x;
                this.selectionEndY = y;
                this.isShiftPressed = isShiftPressed;
                
                if (isShiftPressed) {
                    this.previousSelection = new Set(this.selectedUnits.map(u => u.id));
                } else {
                    this.previousSelection.clear();
                }
            }

            updateSelection(x, y) {
                if (!this.isSelecting) return;
                this.selectionEndX = x;
                this.selectionEndY = y;
            }

            endSelection(units) {
                if (!this.isSelecting) return;
                this.isSelecting = false;

                const minX = Math.min(this.selectionStartX, this.selectionEndX);
                const maxX = Math.max(this.selectionStartX, this.selectionEndX);
                const minY = Math.min(this.selectionStartY, this.selectionEndY);
                const maxY = Math.max(this.selectionStartY, this.selectionEndY);

                const selectionSize = Math.abs(maxX - minX) * Math.abs(maxY - minY);

                if (selectionSize < 25) {
                    const clickedUnit = units.find(u => 
                        u.health > 0 &&
                        !u.isEnemy &&
                        Math.abs(u.x - this.selectionStartX) < u.radius &&
                        Math.abs(u.y - this.selectionStartY) < u.radius
                    );
                    
                    if (clickedUnit) {
                        if (this.isShiftPressed) {
                            if (this.previousSelection.has(clickedUnit.id)) {
                                this.selectedUnits = this.selectedUnits.filter(u => u.id !== clickedUnit.id);
                                clickedUnit.isSelected = false;
                            } else {
                                this.selectedUnits.push(clickedUnit);
                                clickedUnit.isSelected = true;
                            }
                        } else {
                            this.selectedUnits.forEach(u => u.isSelected = false);
                            this.selectedUnits = [clickedUnit];
                            clickedUnit.isSelected = true;
                        }
                    } else if (!this.isShiftPressed) {
                        this.selectedUnits.forEach(u => u.isSelected = false);
                        this.selectedUnits = [];
                    }
                } else {
                    const newlySelected = [];
                    
                    for (const unit of units) {
                        if (unit.health > 0 && !unit.isEnemy) {
                            const inSelection = unit.x >= minX && unit.x <= maxX && 
                                               unit.y >= minY && unit.y <= maxY;
                            
                            if (inSelection) {
                                newlySelected.push(unit);
                            }
                        }
                    }

                    if (!this.isShiftPressed) {
                        this.selectedUnits.forEach(u => u.isSelected = false);
                        this.selectedUnits = newlySelected;
                        newlySelected.forEach(u => u.isSelected = true);
                    } else {
                        for (const unit of newlySelected) {
                            if (!this.previousSelection.has(unit.id)) {
                                this.selectedUnits.push(unit);
                                unit.isSelected = true;
                            }
                        }
                    }
                }
            }

            drawSelection(ctx) {
                if (!this.isSelecting) return;

                const minX = Math.min(this.selectionStartX, this.selectionEndX);
                const maxX = Math.max(this.selectionStartX, this.selectionEndX);
                const minY = Math.min(this.selectionStartY, this.selectionEndY);
                const maxY = Math.max(this.selectionStartY, this.selectionEndY);

                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(0, 255, 0, 0.1)';
                ctx.fillRect(minX, minY, maxX - minX, maxY - minY);
            }
        }
    </script>

    <script>
        class FormationController {
            constructor() {
                this.currentFormation = 'line';
                this.units = [];
                this.formationCenterX = 0;
                this.formationCenterY = 0;
                this.targetCenterX = 0;
                this.targetCenterY = 0;
                this.isMoving = false;
                this.formationSpacing = 35;
                this.formationAngle = 0;
                
                this.formationPatterns = new Map();
                this.formationPatterns.set('line', new LineFormation());
                this.formationPatterns.set('column', new ColumnFormation());
                this.formationPatterns.set('wedge', new WedgeFormation());
            }

            setFormation(type) {
                this.currentFormation = type;
                this.calculateFormationOffsets();
            }

            calculateFormationOffsets() {
                const pattern = this.formationPatterns.get(this.currentFormation);
                if (!pattern) return;

                const aliveUnits = this.units.filter(u => u.health > 0);
                aliveUnits.sort((a, b) => {
                    const dx = a.x - this.formationCenterX;
                    const dy = a.y - this.formationCenterY;
                    const distA = Math.sqrt(dx * dx + dy * dy);
                    const dx2 = b.x - this.formationCenterX;
                    const dy2 = b.y - this.formationCenterY;
                    const distB = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                    return distA - distB;
                });

                aliveUnits.forEach((unit, index) => {
                    const offset = pattern.getOffset(index, aliveUnits.length, this.formationSpacing);
                    
                    const cos = Math.cos(this.formationAngle);
                    const sin = Math.sin(this.formationAngle);
                    unit.formationOffsetX = offset.x * cos - offset.y * sin;
                    unit.formationOffsetY = offset.x * sin + offset.y * cos;
                });
            }

            moveFormation(targetX, targetY) {
                if (this.units.length === 0) return;

                this.targetCenterX = targetX;
                this.targetCenterY = targetY;
                this.isMoving = true;

                const dx = targetX - this.formationCenterX;
                const dy = targetY - this.formationCenterY;
                this.formationAngle = Math.atan2(dy, dx) - Math.PI / 2;
                
                this.calculateFormationOffsets();
                this.updateUnitTargets();
            }

            updateUnitTargets() {
                const formationSpeed = this.getFormationSpeed();
                
                for (const unit of this.units) {
                    if (unit.health <= 0) continue;
                    
                    const targetX = this.targetCenterX + unit.formationOffsetX;
                    const targetY = this.targetCenterY + unit.formationOffsetY;
                    
                    unit.maxSpeed = formationSpeed;
                    unit.moveTo(targetX, targetY);
                }
            }

            stopFormation() {
                this.isMoving = false;
                for (const unit of this.units) {
                    unit.stop();
                }
            }

            updateFormationPositions(deltaTime) {
                if (!this.isMoving || this.units.length === 0) return;

                this.updateFormationCenter();
                
                const dx = this.targetCenterX - this.formationCenterX;
                const dy = this.targetCenterY - this.formationCenterY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 5) {
                    this.updateUnitTargets();
                } else {
                    let allStopped = true;
                    for (const unit of this.units) {
                        if (unit.health > 0 && unit.isMoving) {
                            allStopped = false;
                            break;
                        }
                    }
                    if (allStopped) {
                        this.isMoving = false;
                    }
                }
            }

            updateFormationCenter() {
                let sumX = 0;
                let sumY = 0;
                let count = 0;

                for (const unit of this.units) {
                    if (unit.health > 0) {
                        sumX += unit.x;
                        sumY += unit.y;
                        count++;
                    }
                }

                if (count > 0) {
                    this.formationCenterX = sumX / count;
                    this.formationCenterY = sumY / count;
                }
            }

            getFormationSpeed() {
                let minSpeed = Infinity;
                for (const unit of this.units) {
                    if (unit.health > 0 && unit.maxSpeed < minSpeed) {
                        minSpeed = unit.maxSpeed;
                    }
                }
                return minSpeed === Infinity ? 2 : minSpeed;
            }

            addUnit(unit) {
                if (!this.units.find(u => u.id === unit.id)) {
                    this.units.push(unit);
                    this.updateFormationCenter();
                    this.calculateFormationOffsets();
                }
            }

            removeUnit(unit) {
                this.units = this.units.filter(u => u.id !== unit.id);
                this.updateFormationCenter();
                this.calculateFormationOffsets();
            }

            clearUnits() {
                this.units = [];
                this.formationCenterX = 0;
                this.formationCenterY = 0;
                this.isMoving = false;
            }
        }
    </script>

    <script>
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.units = [];
                this.selectionManager = new SelectionManager();
                this.formationController = new FormationController();
                
                this.lastTime = 0;
                this.frameCount = 0;
                this.fps = 60;
                this.fpsUpdateTime = 0;

                this.initUnits();
                this.initEventListeners();
                this.updateUI();
                this.gameLoop();
            }

            initUnits() {
                for (let i = 0; i < 10; i++) {
                    const x = 100 + Math.random() * 200;
                    const y = 100 + Math.random() * 400;
                    this.units.push(new Unit(x, y, false, '剑士'));
                }
                
                for (let i = 0; i < 5; i++) {
                    const x = 550 + Math.random() * 200;
                    const y = 100 + Math.random() * 400;
                    this.units.push(new Unit(x, y, true, '弓箭手'));
                }
            }

            initEventListeners() {
                this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
                this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));
                this.canvas.addEventListener('mouseup', (e) => this.onMouseUp(e));
                this.canvas.addEventListener('contextmenu', (e) => this.onRightClick(e));
                document.addEventListener('keydown', (e) => this.onKeyDown(e));

                document.querySelectorAll('.formation-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const formation = btn.dataset.formation;
                        this.setFormation(formation);
                    });
                });

                document.getElementById('stopBtn').addEventListener('click', () => {
                    this.stopSelectedUnits();
                });
            }

            onMouseDown(e) {
                if (e.button === 0) {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    this.selectionManager.startSelection(x, y, e.shiftKey);
                }
            }

            onMouseMove(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                this.selectionManager.updateSelection(x, y);
            }

            onMouseUp(e) {
                if (e.button === 0) {
                    this.selectionManager.endSelection(this.units);
                    this.updateFormationUnits();
                    this.updateUI();
                }
            }

            onRightClick(e) {
                e.preventDefault();
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const clickedEnemy = this.units.find(u => 
                    u.health > 0 &&
                    u.isEnemy &&
                    Math.abs(u.x - x) < u.radius &&
                    Math.abs(u.y - y) < u.radius
                );

                const selectedUnits = this.selectionManager.selectedUnits.filter(u => u.health > 0);
                
                if (selectedUnits.length === 0) return;

                if (clickedEnemy) {
                    for (const unit of selectedUnits) {
                        unit.attackTarget(clickedEnemy);
                    }
                } else {
                    if (selectedUnits.length > 1) {
                        this.formationController.moveFormation(x, y);
                    } else {
                        for (const unit of selectedUnits) {
                            unit.maxSpeed = 2 + Math.random() * 2;
                            unit.moveTo(x, y);
                        }
                    }
                }
            }

            onKeyDown(e) {
                switch(e.key) {
                    case '1':
                        this.setFormation('line');
                        break;
                    case '2':
                        this.setFormation('column');
                        break;
                    case '3':
                        this.setFormation('wedge');
                        break;
                    case 's':
                    case 'S':
                        this.stopSelectedUnits();
                        break;
                }
            }

            setFormation(type) {
                this.formationController.setFormation(type);
                
                document.querySelectorAll('.formation-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.formation === type);
                });

                const formationNames = {
                    'line': '横排',
                    'column': '纵列',
                    'wedge': '楔形'
                };
                document.getElementById('currentFormation').textContent = formationNames[type];
            }

            updateFormationUnits() {
                this.formationController.clearUnits();
                for (const unit of this.selectionManager.selectedUnits) {
                    if (unit.health > 0) {
                        this.formationController.addUnit(unit);
                    }
                }
            }

            stopSelectedUnits() {
                for (const unit of this.selectionManager.selectedUnits) {
                    unit.stop();
                }
                this.formationController.stopFormation();
            }

            updateUI() {
                const selectedUnits = this.selectionManager.selectedUnits.filter(u => u.health > 0);
                document.getElementById('selectedCount').textContent = selectedUnits.length;

                const unitList = document.getElementById('unitList');
                if (selectedUnits.length === 0) {
                    unitList.innerHTML = '<div style="color: #7f8c8d; font-size: 12px; text-align: center; padding: 20px;">拖动鼠标框选单位</div>';
                } else {
                    unitList.innerHTML = selectedUnits.slice(0, 8).map(unit => `
                        <div class="unit-item">
                            <span class="unit-name">${unit.unitType}</span>
                            <span class="unit-health">${Math.round(unit.health)}/${Math.round(unit.maxHealth)}</span>
                        </div>
                    `).join('');
                    if (selectedUnits.length > 8) {
                        unitList.innerHTML += `<div style="text-align: center; color: #7f8c8d; font-size: 11px; padding-top: 8px;">还有 ${selectedUnits.length - 8} 个单位...</div>`;
                    }
                }

                const aliveUnits = this.units.filter(u => u.health > 0).length;
                document.getElementById('aliveUnits').textContent = aliveUnits;
            }

            update(timestamp) {
                const deltaTime = timestamp - this.lastTime;
                this.lastTime = timestamp;

                this.frameCount++;
                this.fpsUpdateTime += deltaTime;
                if (this.fpsUpdateTime >= 1000) {
                    this.fps = Math.round(this.frameCount * 1000 / this.fpsUpdateTime);
                    document.getElementById('fpsDisplay').textContent = this.fps;
                    this.frameCount = 0;
                    this.fpsUpdateTime = 0;
                }

                for (const unit of this.units) {
                    unit.update(deltaTime, this.units);
                }

                this.formationController.updateFormationPositions(deltaTime);

                this.updateUI();
            }

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                this.drawGrid();

                for (const unit of this.units) {
                    unit.draw(this.ctx);
                }

                this.selectionManager.drawSelection(this.ctx);

                this.drawMoveTarget();
            }

            drawGrid() {
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                this.ctx.lineWidth = 1;

                const gridSize = 40;
                for (let x = 0; x <= this.canvas.width; x += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, 0);
                    this.ctx.lineTo(x, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let y = 0; y <= this.canvas.height; y += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, y);
                    this.ctx.lineTo(this.canvas.width, y);
                    this.ctx.stroke();
                }
            }

            drawMoveTarget() {
                if (this.formationController.isMoving) {
                    const centerX = this.formationController.targetCenterX;
                    const centerY = this.formationController.targetCenterY;
                    
                    this.ctx.beginPath();
                    this.ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
                    this.ctx.fillStyle = 'rgba(255, 255, 0, 0.5)';
                    this.ctx.fill();
                }
            }

            gameLoop(timestamp = 0) {
                this.update(timestamp);
                this.draw();
                requestAnimationFrame((t) => this.gameLoop(t));
            }
        }

        window.addEventListener('load', () => {
            new Game();
        });
    </script>
</body>
</html>

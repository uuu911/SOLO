    <script>
        (function(PolisGame) {
            PolisGame.Types = {
                StatType: {
                    ECONOMY: 'economy',
                    MILITARY: 'military',
                    DIPLOMACY: 'diplomacy'
                },

                EventCategory: {
                    ECONOMIC: 'economic',
                    MILITARY: 'military',
                    DIPLOMATIC: 'diplomatic'
                },

                ValueRange: {
                    LOW: 0,
                    MEDIUM: 1,
                    HIGH: 2
                },

                IEffect: function() {},
                IHistoricalEvent: function() {},
                IGameState: function() {},
                IEventHistoryEntry: function() {}
            };
        })(window.PolisGame);
    </script>

    <script>
        (function(PolisGame) {
            const Types = PolisGame.Types;

            function GameState() {
                this.year = -490;
                this.economy = 50;
                this.military = 50;
                this.diplomacy = 50;
                this.turnCount = 0;
                this.victoryStreak = { type: null, count: 0 };
            }

            GameState.prototype.clone = function() {
                const cloned = new GameState();
                cloned.year = this.year;
                cloned.economy = this.economy;
                cloned.military = this.military;
                cloned.diplomacy = this.diplomacy;
                cloned.turnCount = this.turnCount;
                cloned.victoryStreak = { 
                    type: this.victoryStreak.type, 
                    count: this.victoryStreak.count 
                };
                return cloned;
            };

            GameState.prototype.applyEffect = function(effect) {
                const variation = 1 + (Math.random() * 0.4 - 0.2);
                
                this.economy += Math.round((effect.economy || 0) * variation);
                this.military += Math.round((effect.military || 0) * variation);
                this.diplomacy += Math.round((effect.diplomacy || 0) * variation);

                this.economy = Math.max(0, Math.min(100, this.economy));
                this.military = Math.max(0, Math.min(100, this.military));
                this.diplomacy = Math.max(0, Math.min(100, this.diplomacy));

                this.year += 1;
                this.turnCount += 1;
            };

            GameState.prototype.getValueRange = function(statType) {
                const value = this[statType];
                if (value <= 25) return Types.ValueRange.LOW;
                if (value >= 75) return Types.ValueRange.HIGH;
                return Types.ValueRange.MEDIUM;
            };

            GameState.prototype.checkGameEnd = function() {
                if (this.economy <= 0 || this.military <= 0 || this.diplomacy <= 0) {
                    return {
                        ended: true,
                        type: 'defeat',
                        reason: this.economy <= 0 ? '经济崩溃' : 
                                this.military <= 0 ? '军事覆灭' : '外交孤立'
                    };
                }

                const checkStreak = (statType, statName) => {
                    if (this[statType] >= 100) {
                        if (this.victoryStreak.type === statType) {
                            this.victoryStreak.count++;
                        } else {
                            this.victoryStreak.type = statType;
                            this.victoryStreak.count = 1;
                        }
                        if (this.victoryStreak.count >= 3) {
                            return { ended: true, type: 'victory', reason: statName };
                        }
                    }
                    return null;
                };

                const econVictory = checkStreak('economy', '经济繁荣');
                if (econVictory) return econVictory;

                const milVictory = checkStreak('military', '军事霸权');
                if (milVictory) return milVictory;

                const dipVictory = checkStreak('diplomacy', '外交领袖');
                if (dipVictory) return dipVictory;

                if (this.victoryStreak.type && this[this.victoryStreak.type] < 100) {
                    this.victoryStreak.type = null;
                    this.victoryStreak.count = 0;
                }

                if (this.turnCount >= 25) {
                    return { ended: true, type: 'history', reason: '岁月流逝' };
                }

                return { ended: false };
            };

            PolisGame.State = {
                GameState: GameState,
                currentState: new GameState(),
                historyStack: [],
                undoState: null
            };
        })(window.PolisGame);
    </script>

            PolisGame.Events = {
                eventPool: historicalEvents,
                
                validateEvent: function(event) {
                    return event && event.id && event.title && event.description && 
                           event.choices && event.choices.length >= 2;
                },

                getFilteredEvents: function(gameState) {
                    return this.eventPool.filter(event => {
                        if (!this.validateEvent(event)) return false;
                        
                        if (event.triggerCondition) {
                            for (const [stat, range] of Object.entries(event.triggerCondition)) {
                                if (gameState.getValueRange(stat) !== range) {
                                    return false;
                                }
                            }
                        }
                        return true;
                    });
                },

                getFallbackEvents: function() {
                    return this.eventPool.filter(e => this.validateEvent(e));
                }
            };
        })(window.PolisGame);

    <script>
        (function(PolisGame) {
            const Types = PolisGame.Types;
            const Events = PolisGame.Events;
            const State = PolisGame.State;

            const recentCategories = [];
            const MAX_RECENT_CATEGORIES = 3;

            function selectRandomEvent(events) {
                if (events.length === 0) return null;
                const randomIndex = Math.floor(Math.random() * events.length);
                return events[randomIndex];
            }

            function isCategoryBlocked(category) {
                if (recentCategories.length < MAX_RECENT_CATEGORIES) return false;
                return recentCategories.every(cat => cat === category);
            }

            function addToRecentCategories(category) {
                recentCategories.push(category);
                if (recentCategories.length > MAX_RECENT_CATEGORIES) {
                    recentCategories.shift();
                }
            }

            function selectEvent(gameState) {
                let filteredEvents = Events.getFilteredEvents(gameState);
                
                let availableEvents = filteredEvents.filter(event => 
                    !isCategoryBlocked(event.category)
                );

                if (availableEvents.length === 0) {
                    availableEvents = Events.getFallbackEvents();
                }

                const selectedEvent = selectRandomEvent(availableEvents);
                if (selectedEvent) {
                    addToRecentCategories(selectedEvent.category);
                }

                return selectedEvent;
            }

            function clearRecentCategories() {
                recentCategories.length = 0;
            }

            PolisGame.EventManager = {
                selectEvent: selectEvent,
                clearRecentCategories: clearRecentCategories
            };
        })(window.PolisGame);
    </script>

    <script>
        (function(PolisGame) {
            const State = PolisGame.State;
            const EventManager = PolisGame.EventManager;
            const Types = PolisGame.Types;

            let currentEvent = null;

            function initGame() {
                State.currentState = new State.GameState();
                State.historyStack = [];
                State.undoState = null;
                EventManager.clearRecentCategories();
                nextTurn();
            }

            function nextTurn() {
                currentEvent = EventManager.selectEvent(State.currentState);
                if (!currentEvent) {
                    currentEvent = PolisGame.Events.eventPool[0];
                }
                PolisGame.UI.renderEvent(currentEvent);
                PolisGame.UI.updateStatusDisplay();
            }

            function makeChoice(choiceIndex) {
                const choice = currentEvent.choices[choiceIndex];
                
                State.undoState = State.currentState.clone();
                
                State.historyStack.push({
                    eventId: currentEvent.id,
                    choiceIndex: choiceIndex,
                    stateBefore: State.undoState.clone()
                });

                State.currentState.applyEffect(choice.effect);

                const gameEnd = State.currentState.checkGameEnd();
                if (gameEnd.ended) {
                    PolisGame.UI.showGameEnd(gameEnd);
                } else {
                    nextTurn();
                }
            }

            function undoLastTurn() {
                if (State.undoState) {
                    State.currentState = State.undoState;
                    State.undoState = null;
                    State.historyStack.pop();
                    nextTurn();
                }
            }

            function canUndo() {
                return State.undoState !== null;
            }

            PolisGame.GameLoop = {
                initGame: initGame,
                makeChoice: makeChoice,
                undoLastTurn: undoLastTurn,
                canUndo: canUndo
            };
        })(window.PolisGame);
    </script>

    <script>
        (function(PolisGame) {
            const State = PolisGame.State;
            const GameLoop = PolisGame.GameLoop;

            function updateStatusDisplay() {
                const state = State.currentState;
                
                const yearDisplay = document.getElementById('year-display');
                yearDisplay.textContent = `公元前 ${Math.abs(state.year)} 年`;

                updateStatDisplay('economy', state.economy);
                updateStatDisplay('military', state.military);
                updateStatDisplay('diplomacy', state.diplomacy);

                document.getElementById('turn-count').textContent = state.turnCount;

                const streakDisplay = document.getElementById('streak-display');
                if (state.victoryStreak.count > 0) {
                    const statNames = { economy: '经济', military: '军事', diplomacy: '外交' };
                    streakDisplay.textContent = `🔥 ${statNames[state.victoryStreak.type]}鼎盛 ${state.victoryStreak.count}/3 回合`;
                } else {
                    streakDisplay.textContent = '';
                }

                document.getElementById('undo-btn').disabled = !GameLoop.canUndo();
            }

            function updateStatDisplay(statName, value) {
                document.getElementById(`${statName}-value`).textContent = value;
                const bar = document.getElementById(`${statName}-bar`);
                bar.style.width = `${value}%`;
            }

            function renderEvent(event) {
                document.getElementById('event-title').textContent = event.title;
                document.getElementById('event-description').textContent = event.description;

                const choicesContainer = document.getElementById('choices-container');
                choicesContainer.innerHTML = '';

                event.choices.forEach((choice, index) => {
                    const button = document.createElement('button');
                    button.className = 'choice-btn';
                    
                    const tooltip = generateEffectTooltip(choice.effect);
                    button.innerHTML = `${choice.text}<div class="effect-tooltip">${tooltip}</div>`;
                    
                    button.onclick = () => GameLoop.makeChoice(index);
                    choicesContainer.appendChild(button);
                });
            }

            function generateEffectTooltip(effect) {
                const parts = [];
                if (effect.economy) parts.push(`经济${effect.economy > 0 ? '+' : ''}${effect.economy}`);
                if (effect.military) parts.push(`军事${effect.military > 0 ? '+' : ''}${effect.military}`);
                if (effect.diplomacy) parts.push(`外交${effect.diplomacy > 0 ? '+' : ''}${effect.diplomacy}`);
                return parts.join(' · ') || '影响未知';
            }

            function showGameEnd(gameEnd) {
                const modal = document.getElementById('game-over-modal');
                const title = document.getElementById('modal-title');
                const description = document.getElementById('modal-description');

                modal.classList.remove('hidden');
                
                if (gameEnd.type === 'victory') {
                    title.textContent = '🏆 伟大胜利';
                    title.className = 'modal-title victory';
                    description.innerHTML = `
                        经过 ${State.currentState.turnCount} 回合的励精图治，<br>
                        你的城邦凭借<strong>${gameEnd.reason}</strong>成为爱琴海最伟大的城邦！<br><br>
                        你作为执政官将永载史册，为后世所传颂。
                    `;
                } else if (gameEnd.type === 'defeat') {
                    title.textContent = '💀 城邦覆灭';
                    title.className = 'modal-title defeat';
                    description.innerHTML = `
                        由于<strong>${gameEnd.reason}</strong>，你的城邦在第 ${State.currentState.turnCount} 回合走向了灭亡。<br><br>
                        爱琴海的波涛将淹没一切痕迹，只留下史书中的一声叹息。
                    `;
                } else {
                    title.textContent = '📜 历史长河';
                    title.className = 'modal-title history';
                    description.innerHTML = `
                        ${State.currentState.turnCount} 回合岁月悠悠而过。<br><br>
                        你的城邦既未走向鼎盛，也未覆灭于危难，<br>
                        只是随着历史的长河缓缓流淌，<br>
                        最终消逝在时间的迷雾之中...
                    `;
                }
            }

            function resetGame() {
                document.getElementById('game-over-modal').classList.add('hidden');
                GameLoop.initGame();
            }

            PolisGame.UI = {
                updateStatusDisplay: updateStatusDisplay,
                renderEvent: renderEvent,
                showGameEnd: showGameEnd,
                resetGame: resetGame
            };

            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('undo-btn').onclick = () => GameLoop.undoLastTurn();
                document.getElementById('reset-btn').onclick = resetGame;
                GameLoop.initGame();
            });
        })(window.PolisGame);
    </script>

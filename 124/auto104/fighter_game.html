<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地双人对战格斗游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 4px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(100, 100, 200, 0.3);
        }
        #controls {
            margin-top: 20px;
            color: #fff;
            display: flex;
            gap: 40px;
            font-size: 14px;
        }
        .player-controls {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 8px;
        }
        .player-controls h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
        .player1-title { color: #4a9eff; }
        .player2-title { color: #ff4a4a; }
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 15px;
        }
        .key {
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>
    <div id="controls">
        <div class="player-controls">
            <h3 class="player1-title">玩家 1 (蓝色)</h3>
            <div class="controls-grid">
                <span><span class="key">W</span> 跳跃</span>
                <span><span class="key">A/D</span> 移动</span>
                <span><span class="key">S</span> 蹲防</span>
                <span><span class="key">F</span> 轻攻击</span>
                <span><span class="key">G</span> 重攻击</span>
                <span><span class="key">R</span> 防御</span>
                <span><span class="key">T</span> 投技</span>
                <span><span class="key">V</span> 超必杀</span>
            </div>
        </div>
        <div class="player-controls">
            <h3 class="player2-title">玩家 2 (红色)</h3>
            <div class="controls-grid">
                <span><span class="key">↑</span> 跳跃</span>
                <span><span class="key">←/→</span> 移动</span>
                <span><span class="key">↓</span> 蹲防</span>
                <span><span class="key">Num0</span> 轻攻击</span>
                <span><span class="key">Num.</span> 重攻击</span>
                <span><span class="key">NumEnter</span> 防御</span>
                <span><span class="key">Num+</span> 投技</span>
                <span><span class="key">Num*</span> 超必杀</span>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            CANVAS_WIDTH: 800,
            CANVAS_HEIGHT: 400,
            GROUND_Y: 350,
            GRAVITY: 1800,
            MOVE_SPEED: 300,
            JUMP_FORCE: -550,
            AIR_CONTROL: 0.7,
            FRICTION: 0.85,
            LANDING_HITSTUN: 8,
            ROUND_TIME: 60,
            COMBO_WINDOW: 0.4,
            COMBO_DAMAGE_MULTIPLIERS: [1, 1, 1, 1, 0.8, 0.8, 0.8, 0.8, 0.8, 0.6],
            KNOCKDOWN_INVINCIBLE: 1.5,
            WAKEUP_INVINCIBLE: 0.5,
            SUPER_DURATION: 0.5,
            DEFENSE_DRAIN: 5,
            DEFENSE_REDUCTION: 0.7
        };

        class InputManager {
            constructor() {
                this.keys = {};
                this.keyJustPressed = {};
                this.setupListeners();
            }

            setupListeners() {
                window.addEventListener('keydown', (e) => {
                    if (!this.keys[e.code]) {
                        this.keyJustPressed[e.code] = true;
                    }
                    this.keys[e.code] = true;
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                        e.preventDefault();
                    }
                });

                window.addEventListener('keyup', (e) => {
                    this.keys[e.code] = false;
                });
            }

            update() {
                this.keyJustPressed = {};
            }

            isKeyDown(code) {
                return this.keys[code] || false;
            }

            isKeyPressed(code) {
                return this.keyJustPressed[code] || false;
            }
        }

        class Fighter {
            constructor(x, color, isPlayer1, inputManager) {
                this.x = x;
                this.y = CONFIG.GROUND_Y - 60;
                this.width = 40;
                this.height = 60;
                this.color = color;
                this.isPlayer1 = isPlayer1;
                this.input = inputManager;
                this.velocityX = 0;
                this.velocityY = 0;
                this.health = 100;
                this.energy = 0;
                this.facingRight = isPlayer1;
                this.isGrounded = true;
                this.isCrouching = false;
                this.isDefending = false;
                this.isAttacking = false;
                this.attackType = null;
                this.attackTimer = 0;
                this.attackHitbox = null;
                this.hasHit = false;
                this.hitstun = 0;
                this.invincibleTime = 0;
                this.isKnockedDown = false;
                this.knockdownTimer = 0;
                this.isSupering = false;
                this.superTimer = 0;
                this.combo = 0;
                this.comboTimer = 0;
                this.landingFrames = 0;
                this.flashTimer = 0;
            }

            update(dt, opponent) {
                if (this.invincibleTime > 0) {
                    this.invincibleTime -= dt;
                }

                if (this.flashTimer > 0) {
                    this.flashTimer -= dt;
                }

                if (this.comboTimer > 0) {
                    this.comboTimer -= dt;
                    if (this.comboTimer <= 0) {
                        this.combo = 0;
                    }
                }

                if (this.isSupering) {
                    this.superTimer -= dt;
                    if (this.superTimer <= 0) {
                        this.isSupering = false;
                        this.isAttacking = false;
                        this.attackHitbox = null;
                    }
                    return;
                }

                if (this.isKnockedDown) {
                    this.knockdownTimer -= dt;
                    if (this.knockdownTimer <= 0) {
                        this.isKnockedDown = false;
                        this.invincibleTime = CONFIG.WAKEUP_INVINCIBLE;
                        this.velocityX = 0;
                    }
                    this.applyPhysics(dt);
                    return;
                }

                if (this.hitstun > 0) {
                    this.hitstun--;
                    this.applyPhysics(dt);
                    return;
                }

                if (this.landingFrames > 0) {
                    this.landingFrames--;
                    this.applyPhysics(dt);
                    return;
                }

                if (this.isAttacking) {
                    this.attackTimer -= dt;
                    if (this.attackTimer <= 0) {
                        this.isAttacking = false;
                        this.attackHitbox = null;
                        this.hasHit = false;
                    }
                    this.applyPhysics(dt);
                    return;
                }

                this.handleInput(dt, opponent);
                this.applyPhysics(dt);
            }

            handleInput(dt, opponent) {
                const prefix = this.isPlayer1 ? ['KeyW', 'KeyS', 'KeyA', 'KeyD', 'KeyF', 'KeyG', 'KeyR', 'KeyT', 'KeyV'] : 
                                                 ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Numpad0', 'NumpadDecimal', 'NumpadEnter', 'NumpadAdd', 'NumpadMultiply'];
                
                const jumpKey = prefix[0];
                const downKey = prefix[1];
                const leftKey = prefix[2];
                const rightKey = prefix[3];
                const lightKey = prefix[4];
                const heavyKey = prefix[5];
                const defendKey = prefix[6];
                const throwKey = prefix[7];
                const superKey = prefix[8];

                this.isDefending = false;
                this.isCrouching = false;

                if (this.input.isKeyDown(downKey) && this.isGrounded) {
                    this.isCrouching = true;
                    this.height = 40;
                    this.y = CONFIG.GROUND_Y - 40;
                } else {
                    this.height = 60;
                }

                if (this.input.isKeyDown(defendKey) && this.isGrounded && !this.isCrouching) {
                    if (this.energy > 0 || this.isDefending) {
                        this.isDefending = true;
                        this.energy -= CONFIG.DEFENSE_DRAIN * dt;
                        if (this.energy < 0) {
                            this.energy = 0;
                            this.isDefending = false;
                        }
                    }
                }

                if (!this.isDefending && !this.isCrouching) {
                    let moveDir = 0;
                    if (this.input.isKeyDown(leftKey)) moveDir -= 1;
                    if (this.input.isKeyDown(rightKey)) moveDir += 1;

                    if (moveDir !== 0) {
                        const speed = this.isGrounded ? CONFIG.MOVE_SPEED : CONFIG.MOVE_SPEED * CONFIG.AIR_CONTROL;
                        this.velocityX = moveDir * speed;
                        if (this.isGrounded) {
                            this.facingRight = moveDir > 0;
                        }
                    } else if (this.isGrounded) {
                        this.velocityX *= CONFIG.FRICTION;
                    }
                }

                if (this.input.isKeyPressed(jumpKey) && this.isGrounded && !this.isCrouching && !this.isDefending) {
                    this.velocityY = CONFIG.JUMP_FORCE;
                    this.isGrounded = false;
                }

                if (this.input.isKeyPressed(lightKey) && !this.isDefending) {
                    this.startAttack('light', 0.15, 8, 20, 40);
                }
                if (this.input.isKeyPressed(heavyKey) && !this.isDefending) {
                    this.startAttack('heavy', 0.3, 15, 30, 50);
                }
                if (this.input.isKeyPressed(throwKey) && !this.isDefending && this.isGrounded) {
                    const dist = Math.abs(this.x - opponent.x);
                    if (dist < 60) {
                        this.startAttack('throw', 0.25, 12, 50, 40);
                    }
                }
                if (this.input.isKeyPressed(superKey) && this.energy >= 100) {
                    this.energy = 0;
                    this.isSupering = true;
                    this.superTimer = CONFIG.SUPER_DURATION;
                    this.isAttacking = true;
                    this.hasHit = false;
                    this.flashTimer = CONFIG.SUPER_DURATION;
                    const attackWidth = 150;
                    this.attackHitbox = {
                        x: this.facingRight ? this.x + this.width / 2 : this.x - attackWidth + this.width / 2,
                        y: this.y - 20,
                        width: attackWidth,
                        height: this.height + 40,
                        damage: 30,
                        type: 'super'
                    };
                }
            }

            startAttack(type, duration, damage, hitboxWidth, hitboxHeight) {
                this.isAttacking = true;
                this.attackType = type;
                this.attackTimer = duration;
                this.hasHit = false;
                const xOffset = this.facingRight ? this.width / 2 : -hitboxWidth + this.width / 2;
                this.attackHitbox = {
                    x: this.x + xOffset,
                    y: this.y + (this.height - hitboxHeight) / 2,
                    width: hitboxWidth,
                    height: hitboxHeight,
                    damage: damage,
                    type: type
                };
            }

            applyPhysics(dt) {
                this.velocityY += CONFIG.GRAVITY * dt;
                this.x += this.velocityX * dt;
                this.y += this.velocityY * dt;

                if (this.y >= CONFIG.GROUND_Y - this.height) {
                    if (!this.isGrounded && this.velocityY > 200) {
                        this.landingFrames = CONFIG.LANDING_HITSTUN;
                    }
                    this.y = CONFIG.GROUND_Y - this.height;
                    this.velocityY = 0;
                    this.isGrounded = true;
                }

                this.x = Math.max(0, Math.min(CONFIG.CANVAS_WIDTH - this.width, this.x));

                if (this.attackHitbox) {
                    const xOffset = this.facingRight ? this.width / 2 : -this.attackHitbox.width + this.width / 2;
                    this.attackHitbox.x = this.x + xOffset;
                    this.attackHitbox.y = this.y + (this.height - this.attackHitbox.height) / 2;
                }
            }

            takeDamage(damage, attackType, attacker) {
                if (this.invincibleTime > 0 || this.isSupering) return false;

                let actualDamage = damage;
                const isFromBehind = (attacker.facingRight && attacker.x < this.x && !this.facingRight) ||
                                    (!attacker.facingRight && attacker.x > this.x && this.facingRight);

                if (this.isDefending && !isFromBehind && attackType !== 'throw') {
                    actualDamage *= (1 - CONFIG.DEFENSE_REDUCTION);
                    this.energy += 5;
                } else {
                    this.isDefending = false;
                    this.combo = 0;
                    this.comboTimer = 0;
                    
                    attacker.combo++;
                    attacker.comboTimer = CONFIG.COMBO_WINDOW;
                    
                    const comboIndex = Math.min(attacker.combo - 1, CONFIG.COMBO_DAMAGE_MULTIPLIERS.length - 1);
                    actualDamage *= CONFIG.COMBO_DAMAGE_MULTIPLIERS[comboIndex];

                    this.hitstun = attackType === 'heavy' ? 20 : 12;
                    this.flashTimer = 0.15;
                }

                this.health -= actualDamage;
                this.energy += 5;
                attacker.energy += 8;
                
                if (this.energy > 100) this.energy = 100;
                if (attacker.energy > 100) attacker.energy = 100;

                if (this.health <= 0) {
                    this.health = 0;
                    this.isKnockedDown = true;
                    this.knockdownTimer = CONFIG.KNOCKDOWN_INVINCIBLE;
                    this.invincibleTime = CONFIG.KNOCKDOWN_INVINCIBLE;
                }

                return true;
            }

            checkCollision(opponent) {
                if (!this.attackHitbox || this.hasHit) return false;
                
                const hb = this.attackHitbox;
                if (hb.x < opponent.x + opponent.width &&
                    hb.x + hb.width > opponent.x &&
                    hb.y < opponent.y + opponent.height &&
                    hb.y + hb.height > opponent.y) {
                    
                    this.hasHit = true;
                    return true;
                }
                return false;
            }
        }

        class Renderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
            }

            render(game) {
                this.ctx.fillStyle = '#16213e';
                this.ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                this.ctx.fillStyle = '#0f3460';
                this.ctx.fillRect(0, CONFIG.GROUND_Y, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT - CONFIG.GROUND_Y);
                
                this.ctx.strokeStyle = '#1a4a7a';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.moveTo(0, CONFIG.GROUND_Y);
                this.ctx.lineTo(CONFIG.CANVAS_WIDTH, CONFIG.GROUND_Y);
                this.ctx.stroke();

                game.fighters.forEach(fighter => {
                    this.drawFighter(fighter);
                });

                this.drawHUD(game);
                this.drawCombo(game);

                if (game.gameOver) {
                    this.drawGameOver(game);
                }
            }

            drawFighter(fighter) {
                const ctx = this.ctx;
                
                if (fighter.invincibleTime > 0 && Math.floor(fighter.invincibleTime * 20) % 2 === 0) {
                    return;
                }

                ctx.save();
                
                let color = fighter.color;
                if (fighter.flashTimer > 0) {
                    color = fighter.isSupering ? '#ffff00' : '#ffffff';
                }

                ctx.fillStyle = color;
                ctx.fillRect(fighter.x, fighter.y, fighter.width, fighter.height);

                if (fighter.isDefending) {
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(fighter.x - 3, fighter.y - 3, fighter.width + 6, fighter.height + 6);
                }

                ctx.fillStyle = '#fff';
                const eyeX = fighter.facingRight ? fighter.x + fighter.width - 12 : fighter.x + 8;
                ctx.fillRect(eyeX, fighter.y + 15, 6, 6);

                if (fighter.isAttacking && fighter.attackHitbox) {
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = fighter.attackType === 'super' ? '#ffff00' : 
                                   fighter.attackType === 'throw' ? '#ff00ff' :
                                   fighter.attackType === 'heavy' ? '#ff6600' : '#ffff00';
                    const hb = fighter.attackHitbox;
                    ctx.fillRect(hb.x, hb.y, hb.width, hb.height);
                    ctx.globalAlpha = 1;
                }

                ctx.restore();
            }

            drawHUD(game) {
                const ctx = this.ctx;
                const p1 = game.fighters[0];
                const p2 = game.fighters[1];

                ctx.fillStyle = '#333';
                ctx.fillRect(20, 20, 200, 25);
                ctx.fillStyle = '#4a9eff';
                ctx.fillRect(20, 20, 200 * (p1.health / 100), 25);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(20, 20, 200, 25);

                ctx.fillStyle = '#333';
                ctx.fillRect(20, 50, 200, 15);
                ctx.fillStyle = '#ffaa00';
                ctx.fillRect(20, 50, 200 * (p1.energy / 100), 15);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(20, 50, 200, 15);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('P1', 25, 38);

                ctx.fillStyle = '#333';
                ctx.fillRect(CONFIG.CANVAS_WIDTH - 220, 20, 200, 25);
                ctx.fillStyle = '#ff4a4a';
                ctx.fillRect(CONFIG.CANVAS_WIDTH - 220, 20, 200 * (p2.health / 100), 25);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(CONFIG.CANVAS_WIDTH - 220, 20, 200, 25);

                ctx.fillStyle = '#333';
                ctx.fillRect(CONFIG.CANVAS_WIDTH - 220, 50, 200, 15);
                ctx.fillStyle = '#ffaa00';
                ctx.fillRect(CONFIG.CANVAS_WIDTH - 220, 50, 200 * (p2.energy / 100), 15);
                ctx.strokeStyle = '#fff';
                ctx.strokeRect(CONFIG.CANVAS_WIDTH - 220, 50, 200, 15);

                ctx.fillStyle = '#fff';
                ctx.textAlign = 'right';
                ctx.fillText('P2', CONFIG.CANVAS_WIDTH - 25, 38);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 28px Arial';
                ctx.textAlign = 'center';
                const timeText = Math.ceil(game.roundTime);
                ctx.fillText(timeText, CONFIG.CANVAS_WIDTH / 2, 45);
            }

            drawCombo(game) {
                const ctx = this.ctx;
                game.fighters.forEach(fighter => {
                    if (fighter.combo >= 2) {
                        ctx.fillStyle = fighter.color;
                        ctx.font = 'bold 32px Arial';
                        ctx.textAlign = 'center';
                        const x = fighter.isPlayer1 ? 120 : CONFIG.CANVAS_WIDTH - 120;
                        ctx.fillText(`${fighter.combo} HITS!`, x, 100);
                    }
                });
            }

            drawGameOver(game) {
                const ctx = this.ctx;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                
                let text = '平局!';
                if (game.winner === 0) text = '玩家 1 获胜!';
                if (game.winner === 1) text = '玩家 2 获胜!';
                
                ctx.fillText(text, CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2);
            }
        }

        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.inputManager = new InputManager();
                this.renderer = new Renderer(this.canvas);
                this.fighters = [];
                this.lastTime = 0;
                this.roundTime = CONFIG.ROUND_TIME;
                this.gameOver = false;
                this.gameOverTimer = 0;
                this.winner = -1;
                this.init();
            }

            init() {
                this.fighters = [
                    new Fighter(150, '#4a9eff', true, this.inputManager),
                    new Fighter(610, '#ff4a4a', false, this.inputManager)
                ];
                this.roundTime = CONFIG.ROUND_TIME;
                this.gameOver = false;
                this.gameOverTimer = 0;
                this.winner = -1;
            }

            start() {
                requestAnimationFrame((time) => this.gameLoop(time));
            }

            gameLoop(currentTime) {
                const dt = Math.min((currentTime - this.lastTime) / 1000, 0.033);
                this.lastTime = currentTime;

                this.update(dt);
                this.renderer.render(this);
                this.inputManager.update();

                requestAnimationFrame((time) => this.gameLoop(time));
            }

            update(dt) {
                if (this.gameOver) {
                    this.gameOverTimer -= dt;
                    if (this.gameOverTimer <= 0) {
                        this.init();
                    }
                    return;
                }

                this.roundTime -= dt;
                if (this.roundTime <= 0) {
                    this.roundTime = 0;
                    this.endGame();
                    return;
                }

                this.fighters.forEach(fighter => {
                    fighter.update(dt, this.fighters.find(f => f !== fighter));
                });

                for (let i = 0; i < this.fighters.length; i++) {
                    const attacker = this.fighters[i];
                    const defender = this.fighters[1 - i];
                    
                    if (attacker.checkCollision(defender)) {
                        defender.takeDamage(attacker.attackHitbox.damage, attacker.attackHitbox.type, attacker);
                    }
                }

                for (let i = 0; i < this.fighters.length; i++) {
                    if (this.fighters[i].health <= 0) {
                        this.winner = 1 - i;
                        this.endGame();
                        return;
                    }
                }
            }

            endGame() {
                this.gameOver = true;
                this.gameOverTimer = 3;
                
                if (this.winner === -1) {
                    const p1Health = this.fighters[0].health;
                    const p2Health = this.fighters[1].health;
                    if (p1Health > p2Health) this.winner = 0;
                    else if (p2Health > p1Health) this.winner = 1;
                    else this.winner = -1;
                }
            }
        }

        const game = new GameEngine();
        game.start();
    </script>
</body>
</html>

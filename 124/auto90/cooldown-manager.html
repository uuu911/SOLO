<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOBA 技能冷却管理模块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #d4af37;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .hud-container {
            position: relative;
            background: linear-gradient(180deg, #1a1a28 0%, #0d0d15 100%);
            border: 2px solid #d4af37;
            border-radius: 8px;
            padding: 24px 32px;
            box-shadow: 
                0 0 20px rgba(212, 175, 55, 0.3),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .hud-container::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 20px;
            right: 20px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            border-radius: 2px 2px 0 0;
        }

        .hud-container::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 20px;
            right: 20px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            border-radius: 0 0 2px 2px;
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 24px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            color: #ffd700;
        }

        .skills-panel {
            display: flex;
            gap: 24px;
            justify-content: center;
        }

        .skill-card {
            position: relative;
            background: linear-gradient(180deg, #252535 0%, #1a1a28 100%);
            border: 1px solid #3a3a4a;
            border-radius: 6px;
            padding: 16px;
            width: 140px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .skill-card:hover {
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .skill-key {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, #d4af37 0%, #b8962e 100%);
            color: #0a0a0f;
            font-weight: bold;
            font-size: 14px;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .skill-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffd700;
            margin-top: 8px;
            margin-bottom: 12px;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        .skill-cooldown-info {
            font-size: 11px;
            color: #8a8a9a;
            margin-bottom: 12px;
        }

        .skill-cooldown-info span {
            color: #d4af37;
            font-weight: 600;
        }

        .cooldown-display {
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cooldown-display.on-cooldown {
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .cast-btn {
            width: 100%;
            padding: 10px 16px;
            background: linear-gradient(180deg, #3a3a5a 0%, #2a2a4a 100%);
            border: 1px solid #5a5a7a;
            border-radius: 4px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cast-btn:hover:not(:disabled) {
            background: linear-gradient(180deg, #4a4a6a 0%, #3a3a5a 100%);
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        .cast-btn:disabled {
            background: linear-gradient(180deg, #2a2a3a 0%, #1a1a2a 100%);
            border-color: #3a3a4a;
            color: #5a5a6a;
            cursor: not-allowed;
        }

        .cast-btn.cooldown-ready {
            animation: ready-flash 0.6s ease-out;
        }

        @keyframes ready-flash {
            0% {
                background: linear-gradient(180deg, #00ff88 0%, #00cc6a 100%);
                border-color: #00ff88;
                box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
                color: #0a0a0f;
            }
            50% {
                background: linear-gradient(180deg, #00ff88 0%, #00cc6a 100%);
                border-color: #00ff88;
                box-shadow: 0 0 30px rgba(0, 255, 136, 1);
                color: #0a0a0f;
            }
            100% {
                background: linear-gradient(180deg, #3a3a5a 0%, #2a2a4a 100%);
                border-color: #5a5a7a;
                box-shadow: none;
                color: #ffffff;
            }
        }

        .stats-panel {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #3a3a4a;
            text-align: center;
            font-size: 12px;
            color: #8a8a9a;
        }

        .stats-panel span {
            color: #d4af37;
            font-weight: 600;
        }

        .hint {
            margin-top: 12px;
            font-size: 10px;
            color: #5a5a6a;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hud-container">
        <div class="title">英雄技能面板</div>
        <div class="skills-panel" id="skillsPanel"></div>
        <div class="stats-panel">
            冷却缩减: <span id="cdrValue">40%</span> | 
            按 F12 打开控制台输入 <span>resetAllCooldowns()</span> 重置所有技能
        </div>
        <div class="hint">点击"释放"按钮施放技能，技能将进入冷却状态</div>
    </div>

    <script>
        const SkillModule = (function() {
            function createSkill(name, baseCooldown) {
                return {
                    name: name,
                    baseCooldown: baseCooldown,
                    currentCooldown: 0,
                    isAvailable: true
                };
            }

            return { createSkill };
        })();

        const CooldownManagerModule = (function() {
            const COOLDOWN_REDUCTION = 0.40;
            let skills = [];
            let timerInterval = null;

            class CooldownManager {
                constructor() {
                    this.skills = [];
                    this.tickRate = 100;
                }

                registerSkill(skill) {
                    this.skills.push(skill);
                    return this;
                }

                getActualCooldown(baseCooldown) {
                    return baseCooldown * (1 - COOLDOWN_REDUCTION);
                }

                castSkill(index) {
                    const skill = this.skills[index];
                    if (skill && skill.isAvailable) {
                        const actualCooldown = this.getActualCooldown(skill.baseCooldown);
                        skill.currentCooldown = actualCooldown;
                        skill.isAvailable = false;
                        return true;
                    }
                    return false;
                }

                updateCooldowns(deltaTime) {
                    this.skills.forEach((skill, index) => {
                        if (!skill.isAvailable && skill.currentCooldown > 0) {
                            skill.currentCooldown = Math.max(0, skill.currentCooldown - deltaTime);
                            if (skill.currentCooldown <= 0) {
                                skill.currentCooldown = 0;
                                skill.isAvailable = true;
                                if (this.onSkillReady) {
                                    this.onSkillReady(index);
                                }
                            }
                        }
                    });
                }

                start() {
                    let lastTime = Date.now();
                    this.timerInterval = setInterval(() => {
                        const currentTime = Date.now();
                        const deltaTime = (currentTime - lastTime) / 1000;
                        lastTime = currentTime;
                        this.updateCooldowns(deltaTime);
                        if (this.onUpdate) {
                            this.onUpdate();
                        }
                    }, this.tickRate);
                }

                stop() {
                    if (this.timerInterval) {
                        clearInterval(this.timerInterval);
                        this.timerInterval = null;
                    }
                }

                resetAllCooldowns() {
                    this.skills.forEach(skill => {
                        skill.currentCooldown = 0;
                        skill.isAvailable = true;
                    });
                    if (this.onUpdate) {
                        this.onUpdate();
                    }
                }

                getCooldownReduction() {
                    return COOLDOWN_REDUCTION;
                }
            }

            return { CooldownManager };
        })();

        const UIModule = (function() {
            const skillKeys = ['Q', 'W', 'E'];
            let manager = null;
            let skillElements = [];

            function createSkillCard(skill, index) {
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.innerHTML = `
                    <div class="skill-key">${skillKeys[index]}</div>
                    <div class="skill-name">${skill.name}</div>
                    <div class="skill-cooldown-info">
                        基础冷却: <span>${skill.baseCooldown.toFixed(1)}s</span>
                    </div>
                    <div class="cooldown-display" id="cd-display-${index}">就绪</div>
                    <button class="cast-btn" id="cast-btn-${index}">释放</button>
                `;
                return card;
            }

            function formatCooldown(value) {
                if (value <= 0) return '就绪';
                return value.toFixed(1) + 's';
            }

            function updateUI() {
                manager.skills.forEach((skill, index) => {
                    const cdDisplay = document.getElementById(`cd-display-${index}`);
                    const castBtn = document.getElementById(`cast-btn-${index}`);

                    if (skill.isAvailable) {
                        cdDisplay.textContent = '就绪';
                        cdDisplay.classList.remove('on-cooldown');
                        castBtn.disabled = false;
                        castBtn.textContent = '释放';
                    } else {
                        cdDisplay.textContent = formatCooldown(skill.currentCooldown);
                        cdDisplay.classList.add('on-cooldown');
                        castBtn.disabled = true;
                        castBtn.textContent = Math.ceil(skill.currentCooldown);
                    }
                });
            }

            function onSkillReady(index) {
                const castBtn = document.getElementById(`cast-btn-${index}`);
                castBtn.classList.remove('cooldown-ready');
                void castBtn.offsetWidth;
                castBtn.classList.add('cooldown-ready');
                setTimeout(() => {
                    castBtn.classList.remove('cooldown-ready');
                }, 600);
            }

            function bindEvents() {
                manager.skills.forEach((_, index) => {
                    const castBtn = document.getElementById(`cast-btn-${index}`);
                    castBtn.addEventListener('click', () => {
                        manager.castSkill(index);
                        updateUI();
                    });
                });
            }

            function init(cooldownManager, skills) {
                manager = cooldownManager;
                const panel = document.getElementById('skillsPanel');
                
                skills.forEach((skill, index) => {
                    const card = createSkillCard(skill, index);
                    panel.appendChild(card);
                    skillElements.push(card);
                });

                manager.onUpdate = updateUI;
                manager.onSkillReady = onSkillReady;
                bindEvents();
                updateUI();
            }

            return { init };
        })();

        (function() {
            const { CooldownManager } = CooldownManagerModule;
            const { createSkill } = SkillModule;

            const skillsData = [
                { name: '暗影突袭', baseCooldown: 8.0 },
                { name: '月神之箭', baseCooldown: 12.0 },
                { name: '疾风步', baseCooldown: 15.0 }
            ];

            const skills = skillsData.map(data => createSkill(data.name, data.baseCooldown));

            const manager = new CooldownManager();
            skills.forEach(skill => manager.registerSkill(skill));

            document.getElementById('cdrValue').textContent = 
                (manager.getCooldownReduction() * 100).toFixed(0) + '%';

            UIModule.init(manager, skills);
            manager.start();

            window.resetAllCooldowns = function() {
                manager.resetAllCooldowns();
                console.log('所有技能冷却已重置！');
            };

            console.log('%c MOBA 技能冷却管理模块 ', 
                'background: #d4af37; color: #0a0a0f; font-size: 16px; font-weight: bold; padding: 4px 8px; border-radius: 4px;');
            console.log('输入 resetAllCooldowns() 可重置所有技能冷却');
        })();
    </script>
</body>
</html>

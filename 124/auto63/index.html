<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战争军事推演沙盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            display: flex;
            gap: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .canvas-container {
            position: relative;
        }

        #gameCanvas {
            border: 3px solid #4a90e2;
            border-radius: 10px;
            background: #2d3436;
        }

        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .panel h3 {
            color: #2c3e50;
            margin-bottom: 10px 0;
            font-size: 16px;
            border-bottom: 2px solid #4a90e2;
            padding-bottom: 8px;
        }

        .turn-info {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px 0;
        }

        .turn-player {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .turn-enemy {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .status-indicator {
            text-align: center;
            padding: 8px;
            background: #e8f4f8;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 14px;
            color: #2c3e50;
        }

        .unit-info {
            font-size: 13px;
            line-height: 1.8;
        }

        .unit-info p {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }

        .unit-info span:first-child {
            font-weight: bold;
            color: #7f8c8d;
        }

        .unit-info span:last-child {
            color: #2c3e50;
        }

        .hp-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 8px 0;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            transition: width 0.3s ease;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-move {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-attack {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .btn-end {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-restart {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            width: 100%;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .instructions {
            font-size: 12px;
            line-height: 1.6;
            color: #7f8c8d;
        }

        .instructions p {
            margin: 5px 0;
        }

        .legend {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            font-size: 11px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .legend-color {
            width: 15px;
            height: 15px;
            border-radius: 3px;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            animation: popIn 0.5s ease;
        }

        .game-over-content h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .victory {
            color: #27ae60;
        }

        .defeat {
            color: #c0392b;
        }

        .draw {
            color: #f39c12;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .no-selection {
            color: #95a5a6;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="canvas-container">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </div>
        <div class="sidebar">
            <div class="panel">
                <h3>回合信息</h3>
                <div id="turnDisplay" class="turn-info turn-player">
                    第 1 回合 - 我方回合
                </div>
                <div id="statusIndicator" class="status-indicator">
                    点击选择单位
                </div>
            </div>
            
            <div class="panel">
                <h3>单位信息</h3>
                <div id="unitInfoPanel" class="unit-info">
                    <div class="no-selection">请点击地图上的单位查看详情</div>
                </div>
            </div>
            
            <div class="panel">
                <h3>操作控制</h3>
                <div class="controls">
                    <button id="btnMove" class="btn btn-move" disabled>移动</button>
                    <button id="btnAttack" class="btn btn-attack" disabled>攻击</button>
                    <button id="btnEndTurn" class="btn btn-end">结束回合</button>
                </div>
                <button id="btnRestart" class="btn btn-restart" style="margin-top: 10px;">重新开始</button>
            </div>
            
            <div class="panel">
                <h3>操作说明</h3>
                <div class="instructions">
                    <p>1. 点击己方单位选中</p>
                    <p>2. 点击"移动"后点击目标格子</p>
                    <p>3. 点击"攻击"后点击敌方单位</p>
                    <p>4. 每单位每回合可移动+攻击各一次</p>
                    <p>5. 移动后可攻击，攻击后不可移动</p>
                </div>
            </div>
            
            <div class="panel">
                <h3>地形图例</h3>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #a8e6cf;"></div>
                        <span>平地</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #2d5a27;"></div>
                        <span>树林</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #8b7355;"></div>
                        <span>丘陵</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #5dade2;"></div>
                        <span>河流</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #95a5a6;"></div>
                        <span>城市</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="gameOverOverlay" class="game-over-overlay">
        <div class="game-over-content">
            <h2 id="gameOverTitle">游戏结束</h2>
            <p id="gameOverMessage" style="margin-bottom: 20px; font-size: 16px;"></p>
            <button id="btnRestartGame" class="btn btn-restart" style="width: auto; padding: 12px 30px;">重新开始</button>
        </div>
    </div>

    <script type="module">
        import Game from './game.js';
        
        const canvas = document.getElementById('gameCanvas');
        const game = new Game(canvas);
        game.init();
    </script>
</body>
</html>

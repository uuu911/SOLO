<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空探索者 - Space Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        #gameCanvas {
            display: block;
            background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 70%, #050510 100%);
        }

        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 70%, #050510 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #startScreen h1 {
            font-size: 48px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        #startScreen p {
            font-size: 18px;
            color: #888;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0, 20, 40, 0.9), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(0, 100, 150, 0.3);
            border: 1px solid rgba(0, 200, 255, 0.5);
            border-radius: 4px;
        }

        .hud-label {
            color: #00ccff;
            font-size: 12px;
        }

        .hud-value {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }

        .shield-bar {
            width: 100px;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        .shield-fill {
            height: 100%;
            background: linear-gradient(to right, #00ff88, #00ffcc);
            transition: width 0.3s;
        }

        .cargo-bar {
            width: 100px;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            overflow: hidden;
        }

        .cargo-fill {
            height: 100%;
            background: linear-gradient(to right, #ffaa00, #ffcc00);
            transition: width 0.3s;
        }

        #scanProgress {
            position: fixed;
            z-index: 100;
            pointer-events: none;
            display: none;
        }

        .scan-bar {
            width: 150px;
            height: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ffff;
            border-radius: 6px;
            overflow: hidden;
        }

        .scan-fill {
            height: 100%;
            background: linear-gradient(to right, #00ffff, #00ffaa);
            width: 0%;
            transition: width 0.1s linear;
        }

        .scan-text {
            text-align: center;
            color: #00ffff;
            font-size: 12px;
            margin-top: 5px;
        }

        #exploration {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 50, 80, 0.8);
            border: 1px solid rgba(0, 200, 255, 0.5);
            border-radius: 4px;
            z-index: 100;
            pointer-events: none;
        }

        #inventory {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 15px;
            background: rgba(0, 50, 80, 0.8);
            border: 1px solid rgba(0, 200, 255, 0.5);
            border-radius: 4px;
            z-index: 100;
            pointer-events: none;
        }

        .inventory-title {
            color: #00ccff;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .inventory-item {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin: 5px 0;
            font-size: 13px;
        }

        .resource-name {
            color: #aaa;
        }

        .resource-amount {
            color: #ffcc00;
            font-weight: bold;
        }

        #infoPanel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            padding: 25px;
            background: rgba(0, 30, 50, 0.95);
            border: 2px solid #00ffff;
            border-radius: 8px;
            z-index: 200;
            display: none;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        #infoPanel h2 {
            color: #00ffff;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 200, 255, 0.2);
        }

        .info-label {
            color: #88ccff;
        }

        .info-value {
            color: #fff;
            font-weight: bold;
        }

        .anomaly-yes {
            color: #ff4444;
        }

        .anomaly-no {
            color: #44ff44;
        }

        #closeInfo {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #0066aa, #0088cc);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            pointer-events: auto;
        }

        #closeInfo:hover {
            background: linear-gradient(to right, #0077bb, #0099dd);
        }

        #upgradePanel {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 280px;
            padding: 20px;
            background: rgba(0, 30, 50, 0.9);
            border: 2px solid #00ffff;
            border-radius: 8px;
            z-index: 150;
            display: none;
        }

        #upgradePanel h3 {
            color: #00ffff;
            margin-bottom: 15px;
            text-align: center;
        }

        .upgrade-item {
            margin: 15px 0;
            padding: 10px;
            background: rgba(0, 100, 150, 0.2);
            border-radius: 4px;
        }

        .upgrade-name {
            color: #88ccff;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .upgrade-level {
            color: #ffcc00;
            font-size: 12px;
        }

        .upgrade-btn {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            background: linear-gradient(to right, #008844, #00aa66);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            pointer-events: auto;
        }

        .upgrade-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .upgrade-btn:not(:disabled):hover {
            background: linear-gradient(to right, #009955, #00bb77);
        }

        #eventPanel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            padding: 25px;
            background: rgba(20, 10, 30, 0.95);
            border: 2px solid #ff6600;
            border-radius: 8px;
            z-index: 300;
            display: none;
            box-shadow: 0 0 30px rgba(255, 100, 0, 0.3);
        }

        #eventPanel h2 {
            color: #ff6600;
            margin-bottom: 15px;
            text-align: center;
        }

        .event-description {
            color: #ffcc99;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .event-choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .event-choice {
            padding: 12px;
            background: linear-gradient(to right, #663300, #884400);
            border: 1px solid #ff6600;
            color: #fff;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            pointer-events: auto;
        }

        .event-choice:hover {
            background: linear-gradient(to right, #774400, #995500);
        }

        .key-sequence {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .key-display {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ff6600;
            border-radius: 6px;
            font-size: 20px;
            font-weight: bold;
        }

        .key-display.correct {
            background: #00aa44;
            border-color: #00ff66;
        }

        .key-display.wrong {
            background: #aa0000;
            border-color: #ff0000;
        }

        .controls-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }

        #collectBtn {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px;
            background: linear-gradient(to right, #00aa66, #00cc88);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            z-index: 100;
            display: none;
        }

        #collectBtn:hover {
            background: linear-gradient(to right, #00bb77, #00dd99);
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>🚀 太空探索者</h1>
        <p>按任意键开始游戏</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="hud" style="display: none;">
        <div class="hud-item">
            <span class="hud-label">护盾</span>
            <div class="shield-bar">
                <div class="shield-fill" id="shieldFill"></div>
            </div>
            <span class="hud-value" id="shieldValue">100</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">引擎等级</span>
            <span class="hud-value" id="engineLevel">1</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">货舱</span>
            <div class="cargo-bar">
                <div class="cargo-fill" id="cargoFill"></div>
            </div>
            <span class="hud-value" id="cargoValue">0/100</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">科技点</span>
            <span class="hud-value" id="techPoints">0</span>
        </div>
        <div class="hud-item" style="cursor: pointer; pointer-events: auto;" onclick="toggleUpgradePanel()">
            <span class="hud-label">[U] 升级</span>
        </div>
    </div>

    <div id="scanProgress">
        <div class="scan-bar">
            <div class="scan-fill" id="scanFill"></div>
        </div>
        <div class="scan-text">扫描中...</div>
    </div>

    <div id="exploration" style="display: none;">
        <span style="color: #00ccff;">已探索: </span>
        <span id="exploredCount" style="color: #fff; font-weight: bold;">0</span>
        <span style="color: #888;"> / </span>
        <span id="totalCount" style="color: #fff; font-weight: bold;">0</span>
        <span style="color: #888;"> 星球</span>
    </div>

    <div id="inventory" style="display: none;">
        <div class="inventory-title">📦 库存</div>
        <div class="inventory-item">
            <span class="resource-name">矿石</span>
            <span class="resource-amount" id="oreAmount">0</span>
        </div>
        <div class="inventory-item">
            <span class="resource-name">气体</span>
            <span class="resource-amount" id="gasAmount">0</span>
        </div>
        <div class="inventory-item">
            <span class="resource-name">生物样本</span>
            <span class="resource-amount" id="bioAmount">0</span>
        </div>
    </div>

    <div id="infoPanel">
        <h2 id="planetName">星球名称</h2>
        <div class="info-row">
            <span class="info-label">类型</span>
            <span class="info-value" id="planetType">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">资源丰度</span>
            <span class="info-value" id="planetAbundance">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">异常信号</span>
            <span class="info-value" id="planetAnomaly">-</span>
        </div>
        <button id="closeInfo">确定</button>
    </div>

    <div id="upgradePanel">
        <h3>🔧 飞船升级</h3>
        <div class="upgrade-item">
            <div class="upgrade-name">引擎速度</div>
            <div class="upgrade-level" id="engineUpgradeInfo">等级 1 | 当前: 200px/s</div>
            <button class="upgrade-btn" id="upgradeEngine" onclick="upgradeEngine()">
                升级 (消耗 10 科技点)
            </button>
        </div>
        <div class="upgrade-item">
            <div class="upgrade-name">护盾强度</div>
            <div class="upgrade-level" id="shieldUpgradeInfo">等级 1 | 当前: 100点</div>
            <button class="upgrade-btn" id="upgradeShield" onclick="upgradeShield()">
                升级 (消耗 15 科技点)
            </button>
        </div>
        <div class="upgrade-item">
            <div class="upgrade-name">货舱容量</div>
            <div class="upgrade-level" id="cargoUpgradeInfo">等级 1 | 当前: 100单位</div>
            <button class="upgrade-btn" id="upgradeCargo" onclick="upgradeCargo()">
                升级 (消耗 12 科技点)
            </button>
        </div>
    </div>

    <div id="eventPanel">
        <h2 id="eventTitle">随机事件</h2>
        <div class="event-description" id="eventDescription">事件描述</div>
        <div class="key-sequence" id="keySequence"></div>
        <div class="event-choices" id="eventChoices"></div>
    </div>

    <button id="collectBtn">采集资源</button>

    <div class="controls-hint" style="display: none;">
        WASD/方向键移动 | 空格扫描星球 | U键升级面板
    </div>

    <script>
        const GameState = {
            STARTING: 'starting',
            PLAYING: 'playing',
            SCANNING: 'scanning',
            EVENT: 'event'
        };

        class EventBus {
            constructor() {
                this.listeners = {};
            }

            on(event, callback) {
                if (!this.listeners[event]) {
                    this.listeners[event] = [];
                }
                this.listeners[event].push(callback);
            }

            emit(event, data) {
                if (this.listeners[event]) {
                    this.listeners[event].forEach(cb => cb(data));
                }
            }
        }

        const eventBus = new EventBus();

        const CONFIG = {
            canvasWidth: 1200,
            canvasHeight: 900,
            friction: 0.98,
            scanDistance: 60,
            scanDuration: 2000,
            baseSpeed: 200,
            baseShield: 100,
            baseCargo: 100
        };

        const game = {
            state: GameState.STARTING,
            canvas: null,
            ctx: null,
            lastTime: 0,
            deltaTime: 0
        };

        const ship = {
            x: 600,
            y: 450,
            vx: 0,
            vy: 0,
            angle: 0,
            engineLevel: 1,
            shieldLevel: 1,
            cargoLevel: 1,
            shield: 100,
            maxShield: 100,
            maxCargo: 100,
            speed: 200
        };

        const inventory = {
            ore: { amount: 0, rarity: 1 },
            gas: { amount: 0, rarity: 1 },
            bio: { amount: 0, rarity: 1 }
        };

        const player = {
            techPoints: 0,
            exploredPlanets: new Set()
        };

        const keys = {};
        let scanningPlanet = null;
        let scanProgress = 0;
        let planets = [];
        let nearestPlanet = null;

        const PLANET_TYPES = {
            rocky: { name: '岩质星球', color: '#8B4513', resources: ['ore', 'bio'], abundanceMod: 1.0 },
            gas: { name: '气态巨星', color: '#4169E1', resources: ['gas'], abundanceMod: 1.5 },
            ice: { name: '冰冻星球', color: '#87CEEB', resources: ['bio', 'gas'], abundanceMod: 0.8 },
            lava: { name: '熔岩星球', color: '#FF4500', resources: ['ore'], abundanceMod: 1.2 }
        };

        const PLANET_NAMES = [
            '阿尔法', '贝塔', '伽马', '德尔塔', '厄普西隆', '泽塔',
            '诺瓦', '极光', '星辰', '深渊', '曙光', '暗影',
            '冰晶', '烈焰', '风暴', '宁静', '永恒', '虚空'
        ];

        function generatePlanets() {
            const numPlanets = Math.floor(Math.random() * 8) + 8;
            planets = [];
            const usedNames = new Set();

            for (let i = 0; i < numPlanets; i++) {
                let attempts = 0;
                let valid = false;
                let planet;

                while (!valid && attempts < 100) {
                    const typeKeys = Object.keys(PLANET_TYPES);
                    const typeKey = typeKeys[Math.floor(Math.random() * typeKeys.length)];
                    const type = PLANET_TYPES[typeKey];

                    let nameIndex = Math.floor(Math.random() * PLANET_NAMES.length);
                    while (usedNames.has(PLANET_NAMES[nameIndex]) && usedNames.size < PLANET_NAMES.length) {
                        nameIndex = Math.floor(Math.random() * PLANET_NAMES.length);
                    }
                    usedNames.add(PLANET_NAMES[nameIndex]);

                    planet = {
                        x: Math.random() * (CONFIG.canvasWidth - 200) + 100,
                        y: Math.random() * (CONFIG.canvasHeight - 200) + 100,
                        radius: Math.random() * 30 + 25,
                        type: typeKey,
                        typeName: type.name,
                        color: type.color,
                        resources: type.resources,
                        abundanceMod: type.abundanceMod,
                        name: PLANET_NAMES[nameIndex] + '-' + (i + 1),
                        abundance: Math.floor(Math.random() * 60) + 40,
                        hasAnomaly: Math.random() < 0.2,
                        scanned: false,
                        collected: false,
                        glowPhase: Math.random() * Math.PI * 2
                    };

                    valid = true;
                    for (const p of planets) {
                        const dist = Math.hypot(planet.x - p.x, planet.y - p.y);
                        if (dist < planet.radius + p.radius + 50) {
                            valid = false;
                            break;
                        }
                    }
                    attempts++;
                }

                if (valid) {
                    planets.push(planet);
                }
            }

            document.getElementById('totalCount').textContent = planets.length;
        }

        function init() {
            game.canvas = document.getElementById('gameCanvas');
            game.ctx = game.canvas.getContext('2d');

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            window.addEventListener('keydown', (e) => {
                if (game.state === GameState.STARTING) {
                    startGame();
                    return;
                }

                keys[e.code] = true;

                if (e.code === 'KeyU') {
                    toggleUpgradePanel();
                }
            });

            window.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });

            document.getElementById('closeInfo').addEventListener('click', () => {
                document.getElementById('infoPanel').style.display = 'none';
                game.state = GameState.PLAYING;
            });

            document.getElementById('collectBtn').addEventListener('click', collectResources);

            eventBus.on('planetScanned', (planet) => {
                player.techPoints += 5;
                player.exploredPlanets.add(planet.name);
                updateHUD();
            });

            eventBus.on('eventTriggered', (event) => {
                game.state = GameState.EVENT;
                showEventPanel(event);
            });

            requestAnimationFrame(gameLoop);
        }

        function resizeCanvas() {
            game.canvas.width = window.innerWidth;
            game.canvas.height = window.innerHeight;
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('exploration').style.display = 'block';
            document.getElementById('inventory').style.display = 'block';
            document.querySelector('.controls-hint').style.display = 'block';

            generatePlanets();
            game.state = GameState.PLAYING;
            updateHUD();
        }

        function gameLoop(timestamp) {
            game.deltaTime = (timestamp - game.lastTime) / 1000;
            game.lastTime = timestamp;

            if (game.deltaTime > 0.1) game.deltaTime = 0.1;

            if (game.state === GameState.PLAYING || game.state === GameState.SCANNING) {
                update();
            }

            render();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            const speed = ship.speed;
            let ax = 0, ay = 0;

            if (keys['KeyW'] || keys['ArrowUp']) ay -= speed;
            if (keys['KeyS'] || keys['ArrowDown']) ay += speed;
            if (keys['KeyA'] || keys['ArrowLeft']) ax -= speed;
            if (keys['KeyD'] || keys['ArrowRight']) ax += speed;

            ship.vx += ax * game.deltaTime;
            ship.vy += ay * game.deltaTime;

            ship.vx *= CONFIG.friction;
            ship.vy *= CONFIG.friction;

            ship.x += ship.vx * game.deltaTime;
            ship.y += ship.vy * game.deltaTime;

            ship.x = Math.max(30, Math.min(CONFIG.canvasWidth - 30, ship.x));
            ship.y = Math.max(30, Math.min(CONFIG.canvasHeight - 30, ship.y));

            if (Math.abs(ship.vx) > 0.1 || Math.abs(ship.vy) > 0.1) {
                ship.angle = Math.atan2(ship.vy, ship.vx);
            }

            findNearestPlanet();
            handleScanning();
            checkRandomEvent();
        }

        function findNearestPlanet() {
            nearestPlanet = null;
            let minDist = CONFIG.scanDistance + 10;

            for (const planet of planets) {
                const dist = Math.hypot(ship.x - planet.x, ship.y - planet.y);
                if (dist < minDist) {
                    minDist = dist;
                    nearestPlanet = planet;
                }
            }

            if (nearestPlanet && !nearestPlanet.scanned) {
                document.getElementById('collectBtn').style.display = nearestPlanet.collected ? 'none' : 'block';
            } else {
                document.getElementById('collectBtn').style.display = 'none';
            }
        }

        function handleScanning() {
            const scanProgressEl = document.getElementById('scanProgress');
            const scanFill = document.getElementById('scanFill');

            if (keys['Space'] && nearestPlanet && !nearestPlanet.scanned) {
                const dist = Math.hypot(ship.x - nearestPlanet.x, ship.y - nearestPlanet.y);
                
                if (dist < CONFIG.scanDistance) {
                    game.state = GameState.SCANNING;
                    scanningPlanet = nearestPlanet;
                    scanProgress += game.deltaTime * 1000;

                    const progress = Math.min(scanProgress / CONFIG.scanDuration, 1);
                    scanFill.style.width = (progress * 100) + '%';

                    scanProgressEl.style.display = 'block';
                    scanProgressEl.style.left = (ship.x + 40) + 'px';
                    scanProgressEl.style.top = (ship.y - 50) + 'px';

                    if (scanProgress >= CONFIG.scanDuration) {
                        completeScan();
                    }
                }
            } else {
                if (game.state === GameState.SCANNING) {
                    game.state = GameState.PLAYING;
                }
                scanProgress = 0;
                scanningPlanet = null;
                scanProgressEl.style.display = 'none';
            }
        }

        function completeScan() {
            const planet = scanningPlanet;
            planet.scanned = true;
            scanProgress = 0;

            eventBus.emit('planetScanned', planet);

            document.getElementById('planetName').textContent = planet.name;
            document.getElementById('planetType').textContent = planet.typeName;
            document.getElementById('planetAbundance').textContent = planet.abundance + '%';
            
            const anomalyEl = document.getElementById('planetAnomaly');
            anomalyEl.textContent = planet.hasAnomaly ? '检测到异常' : '无异常';
            anomalyEl.className = 'info-value ' + (planet.hasAnomaly ? 'anomaly-yes' : 'anomaly-no');

            document.getElementById('infoPanel').style.display = 'block';
            document.getElementById('scanProgress').style.display = 'none';

            updateHUD();
        }

        function collectResources() {
            if (!nearestPlanet || nearestPlanet.collected) return;

            const planet = nearestPlanet;
            const cargoUsed = inventory.ore.amount + inventory.gas.amount + inventory.bio.amount;
            const cargoLeft = ship.maxCargo - cargoUsed;

            if (cargoLeft <= 0) {
                return;
            }

            const collectAmount = Math.min(cargoLeft, Math.floor(planet.abundance / 10 * planet.abundanceMod));

            planet.resources.forEach(res => {
                const perResource = Math.floor(collectAmount / planet.resources.length);
                inventory[res].amount += perResource;
                inventory[res].amount = Math.min(inventory[res].amount, ship.maxCargo);
            });

            planet.collected = true;
            document.getElementById('collectBtn').style.display = 'none';
            updateHUD();
        }

        let lastEventCheck = 0;
        function checkRandomEvent() {
            lastEventCheck += game.deltaTime;
            if (lastEventCheck < 5) return;
            lastEventCheck = 0;

            const exploredRatio = player.exploredPlanets.size / planets.length;
            const eventChance = 0.05 + exploredRatio * 0.1;

            if (Math.random() < eventChance) {
                triggerRandomEvent();
            }
        }

        function triggerRandomEvent() {
            const events = ['pirate', 'asteroid', 'station'];
            const eventType = events[Math.floor(Math.random() * events.length)];

            let eventData;
            switch (eventType) {
                case 'pirate':
                    eventData = {
                        type: 'pirate',
                        title: '⚠️ 太空海盗袭击！',
                        description: '一艘海盗船正在向你逼近！准备战斗或逃离？',
                        choices: [
                            { text: '战斗 (消耗护盾)', action: 'fight' },
                            { text: '逃离 (消耗引擎能量)', action: 'flee' }
                        ]
                    };
                    break;
                case 'asteroid':
                    eventData = {
                        type: 'asteroid',
                        title: '☄️ 小行星带！',
                        description: '你进入了一片密集的小行星带！按正确的方向键序列躲避！',
                        keySequence: generateKeySequence()
                    };
                    break;
                case 'station':
                    eventData = {
                        type: 'station',
                        title: '🛸 废弃太空站',
                        description: '你发现了一座废弃的太空站！是否进入探索？',
                        choices: [
                            { text: '进入探索', action: 'explore' },
                            { text: '继续前进', action: 'skip' }
                        ]
                    };
                    break;
            }

            eventBus.emit('eventTriggered', eventData);
        }

        function generateKeySequence() {
            const keys = ['↑', '↓', '←', '→'];
            const sequence = [];
            for (let i = 0; i < 4; i++) {
                sequence.push(keys[Math.floor(Math.random() * keys.length)]);
            }
            return sequence;
        }

        let currentKeySequence = [];
        let keySequenceIndex = 0;

        function showEventPanel(event) {
            const panel = document.getElementById('eventPanel');
            document.getElementById('eventTitle').textContent = event.title;
            document.getElementById('eventDescription').textContent = event.description;

            const choicesEl = document.getElementById('eventChoices');
            const keySequenceEl = document.getElementById('keySequence');
            choicesEl.innerHTML = '';
            keySequenceEl.innerHTML = '';

            if (event.type === 'asteroid') {
                currentKeySequence = event.keySequence;
                keySequenceIndex = 0;

                currentKeySequence.forEach(key => {
                    const keyDiv = document.createElement('div');
                    keyDiv.className = 'key-display';
                    keyDiv.textContent = key;
                    keySequenceEl.appendChild(keyDiv);
                });

                const keyHandler = (e) => {
                    const keyMap = { 'ArrowUp': '↑', 'ArrowDown': '↓', 'ArrowLeft': '←', 'ArrowRight': '→' };
                    const pressed = keyMap[e.code];
                    
                    if (pressed) {
                        const keyDisplays = keySequenceEl.querySelectorAll('.key-display');
                        
                        if (pressed === currentKeySequence[keySequenceIndex]) {
                            keyDisplays[keySequenceIndex].classList.add('correct');
                            keySequenceIndex++;
                            
                            if (keySequenceIndex >= currentKeySequence.length) {
                                window.removeEventListener('keydown', keyHandler);
                                player.techPoints += 3;
                                closeEventPanel();
                                updateHUD();
                            }
                        } else {
                            keyDisplays[keySequenceIndex].classList.add('wrong');
                            ship.shield = Math.max(0, ship.shield - 30);
                            window.removeEventListener('keydown', keyHandler);
                            setTimeout(closeEventPanel, 1000);
                            updateHUD();
                        }
                    }
                };

                window.addEventListener('keydown', keyHandler);
            } else {
                event.choices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'event-choice';
                    btn.textContent = choice.text;
                    btn.onclick = () => handleEventChoice(event.type, choice.action);
                    choicesEl.appendChild(btn);
                });
            }

            panel.style.display = 'block';
        }

        function handleEventChoice(eventType, action) {
            switch (eventType) {
                case 'pirate':
                    if (action === 'fight') {
                        const damage = 40;
                        ship.shield = Math.max(0, ship.shield - damage);
                        if (ship.shield <= 0) {
                            inventory.ore.amount = Math.max(0, inventory.ore.amount - 10);
                            inventory.gas.amount = Math.max(0, inventory.gas.amount - 10);
                        }
                        player.techPoints += 5;
                    } else {
                        player.techPoints += 2;
                    }
                    break;
                case 'station':
                    if (action === 'explore') {
                        if (Math.random() < 0.7) {
                            player.techPoints += 8;
                            inventory.ore.amount += 10;
                        } else {
                            ship.shield = Math.max(0, ship.shield - 20);
                        }
                    }
                    break;
            }
            closeEventPanel();
            updateHUD();
        }

        function closeEventPanel() {
            document.getElementById('eventPanel').style.display = 'none';
            game.state = GameState.PLAYING;
        }

        function toggleUpgradePanel() {
            const panel = document.getElementById('upgradePanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            updateUpgradePanel();
        }

        function updateUpgradePanel() {
            const engineCost = 10 * Math.pow(1.5, ship.engineLevel - 1);
            const shieldCost = 15 * Math.pow(1.5, ship.shieldLevel - 1);
            const cargoCost = 12 * Math.pow(1.5, ship.cargoLevel - 1);

            document.getElementById('engineUpgradeInfo').textContent = 
                `等级 ${ship.engineLevel} | 当前: ${ship.speed}px/s`;
            document.getElementById('shieldUpgradeInfo').textContent = 
                `等级 ${ship.shieldLevel} | 当前: ${ship.maxShield}点`;
            document.getElementById('cargoUpgradeInfo').textContent = 
                `等级 ${ship.cargoLevel} | 当前: ${ship.maxCargo}单位`;

            document.getElementById('upgradeEngine').textContent = 
                `升级 (消耗 ${Math.floor(engineCost)} 科技点)`;
            document.getElementById('upgradeShield').textContent = 
                `升级 (消耗 ${Math.floor(shieldCost)} 科技点)`;
            document.getElementById('upgradeCargo').textContent = 
                `升级 (消耗 ${Math.floor(cargoCost)} 科技点)`;

            document.getElementById('upgradeEngine').disabled = player.techPoints < engineCost;
            document.getElementById('upgradeShield').disabled = player.techPoints < shieldCost;
            document.getElementById('upgradeCargo').disabled = player.techPoints < cargoCost;
        }

        function upgradeEngine() {
            const cost = 10 * Math.pow(1.5, ship.engineLevel - 1);
            if (player.techPoints >= cost) {
                player.techPoints -= cost;
                ship.engineLevel++;
                ship.speed = CONFIG.baseSpeed + (ship.engineLevel - 1) * 20;
                updateUpgradePanel();
                updateHUD();
            }
        }

        function upgradeShield() {
            const cost = 15 * Math.pow(1.5, ship.shieldLevel - 1);
            if (player.techPoints >= cost) {
                player.techPoints -= cost;
                ship.shieldLevel++;
                ship.maxShield = CONFIG.baseShield + (ship.shieldLevel - 1) * 30;
                ship.shield = ship.maxShield;
                updateUpgradePanel();
                updateHUD();
            }
        }

        function upgradeCargo() {
            const cost = 12 * Math.pow(1.5, ship.cargoLevel - 1);
            if (player.techPoints >= cost) {
                player.techPoints -= cost;
                ship.cargoLevel++;
                ship.maxCargo = CONFIG.baseCargo + (ship.cargoLevel - 1) * 25;
                updateUpgradePanel();
                updateHUD();
            }
        }

        function updateHUD() {
            document.getElementById('shieldValue').textContent = Math.floor(ship.shield);
            document.getElementById('shieldFill').style.width = (ship.shield / ship.maxShield * 100) + '%';
            document.getElementById('engineLevel').textContent = ship.engineLevel;
            
            const cargoUsed = inventory.ore.amount + inventory.gas.amount + inventory.bio.amount;
            document.getElementById('cargoValue').textContent = `${cargoUsed}/${ship.maxCargo}`;
            document.getElementById('cargoFill').style.width = (cargoUsed / ship.maxCargo * 100) + '%';
            document.getElementById('techPoints').textContent = player.techPoints;
            document.getElementById('exploredCount').textContent = player.exploredPlanets.size;

            document.getElementById('oreAmount').textContent = inventory.ore.amount;
            document.getElementById('gasAmount').textContent = inventory.gas.amount;
            document.getElementById('bioAmount').textContent = inventory.bio.amount;
        }

        function render() {
            const ctx = game.ctx;
            const scaleX = game.canvas.width / CONFIG.canvasWidth;
            const scaleY = game.canvas.height / CONFIG.canvasHeight;

            ctx.save();
            ctx.scale(scaleX, scaleY);

            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);

            drawStars(ctx);
            drawPlanets(ctx);

            if (game.state !== GameState.STARTING) {
                drawShip(ctx);
            }

            ctx.restore();
        }

        function drawStars(ctx) {
            const time = Date.now() * 0.001;
            for (let i = 0; i < 100; i++) {
                const x = (i * 127) % CONFIG.canvasWidth;
                const y = (i * 311) % CONFIG.canvasHeight;
                const size = (i % 3) * 0.5 + 0.5;
                const alpha = 0.3 + Math.sin(time + i) * 0.2;
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }

        function drawPlanets(ctx) {
            const time = Date.now() * 0.001;

            planets.forEach(planet => {
                planet.glowPhase += game.deltaTime;

                const glowSize = 10 + Math.sin(planet.glowPhase * 2) * 5;
                const gradient = ctx.createRadialGradient(
                    planet.x, planet.y, planet.radius * 0.5,
                    planet.x, planet.y, planet.radius + glowSize
                );
                gradient.addColorStop(0, planet.color);
                gradient.addColorStop(0.5, planet.color + '88');
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius + glowSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI * 2);
                ctx.fillStyle = planet.color;
                ctx.fill();

                ctx.save();
                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI * 2);
                ctx.clip();

                ctx.globalAlpha = 0.3;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(
                        planet.x - planet.radius * 0.3 + i * planet.radius * 0.3,
                        planet.y - planet.radius * 0.2 + i * planet.radius * 0.15,
                        planet.radius * 0.4,
                        0, Math.PI * 2
                    );
                    ctx.fillStyle = '#000';
                    ctx.fill();
                }
                ctx.restore();

                if (nearestPlanet === planet && !planet.scanned) {
                    ctx.beginPath();
                    ctx.arc(planet.x, planet.y, planet.radius + 15, 0, Math.PI * 2);
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                if (planet.scanned) {
                    ctx.fillStyle = '#00ff88';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('✓', planet.x, planet.y - planet.radius - 20);
                }
            });
        }

        function drawShip(ctx) {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            if (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'] ||
                keys['ArrowUp'] || keys['ArrowDown'] || keys['ArrowLeft'] || keys['ArrowRight']) {
                const flameLength = 15 + Math.random() * 10;
                ctx.beginPath();
                ctx.moveTo(-15, 0);
                ctx.lineTo(-15 - flameLength, -5);
                ctx.lineTo(-15 - flameLength * 0.7, 0);
                ctx.lineTo(-15 - flameLength, 5);
                ctx.closePath();
                ctx.fillStyle = '#ff6600';
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(-15, 0);
                ctx.lineTo(-15 - flameLength * 0.6, -3);
                ctx.lineTo(-15 - flameLength * 0.4, 0);
                ctx.lineTo(-15 - flameLength * 0.6, 3);
                ctx.closePath();
                ctx.fillStyle = '#ffff00';
                ctx.fill();
            }

            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-10, -12);
            ctx.lineTo(-5, 0);
            ctx.lineTo(-10, 12);
            ctx.closePath();

            const shipGradient = ctx.createLinearGradient(-10, -12, 20, 12);
            shipGradient.addColorStop(0, '#4488aa');
            shipGradient.addColorStop(0.5, '#66bbcc');
            shipGradient.addColorStop(1, '#4488aa');
            ctx.fillStyle = shipGradient;
            ctx.fill();

            ctx.beginPath();
            ctx.ellipse(5, 0, 6, 4, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#00ffff';
            ctx.fill();

            if (ship.shield > 0) {
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 255, 136, ${ship.shield / ship.maxShield * 0.5})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            ctx.restore();
        }

        window.onload = init;
    </script>
</body>
</html>

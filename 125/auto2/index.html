function startFBGM(){
if(bgmP==="field")return;stopBGM();initA();
const now=actx.currentTime+0.1;
for(let rep=0;rep<6;rep++){const base=now+rep*8;
for(let ci=0;ci<4;ci++){const t=base+ci*2;const ch=FC_CH[ci];
for(let n=0;n<3;n++){pNote(ch[n],t+n*0.25,0.3,"square",mgain);pNote(ch[n]*2,t+n*0.25+0.5,0.2,"triangle",mgain,5)}
pBass(FC_BA[ci],t,1.8,mgain)}}
fbgm={et:now+6*8};bgmP="field";
}

function startBBGM(){
if(bgmP==="battle")return;stopBGM();initA();
const sh=actx.createWaveShaper();const cv=new Float32Array(256);
for(let i=0;i<256;i++){const x=i*2/255-1;cv[i]=(Math.PI+2)*x*50/(Math.PI+2*Math.abs(x)))}
sh.curve=cv;const bg=actx.createGain();bg.gain.value=0.4;bg.connect(sh);sh.connect(mgain);
const now=actx.currentTime+0.1;
for(let rep=0;rep<10;rep++){const base=now+rep*4;
for(let ci=0;ci<4;ci++){const t=base+ci*1;const ch=BT_CH[ci];
for(let n=0;n<3;n++){pNote(ch[n],t+n*0.15,0.15,"sawtooth",bg);pNote(ch[n]*0.5,t+n*0.15+0.3,0.1,"square",bg,10)}
pBass(BT_BA[ci],t,0.8,bg);pNote(BT_BA[ci]*2,t+0.5,0.2,"square",bg)}}
bbgm={et:now+10*4};bgmP="battle";
}

function calcDmg(atk,def,pow,luck){
const base=atk*pow-def*0.5;const cr=0.05+luck*0.002;const isCr=Math.random()<cr;
const dmg=Math.max(1,Math.floor(base*(0.9+Math.random()*0.2)*(isCr?1.8:1)));
return{dmg,crit:isCr};
}

function pAtk(){const{dmg,crit}=calcDmg(P.atk,bd.en.def.def,1.0,P.luck);bd.en.hp-=dmg;sfx("atk");aLog("Player attacks! "+dmg+" dmg!"+(crit?" CRITICAL!":""));bd.shake=10;if(crit)P.luck=Math.min(100,P.luck+1);chkBEnd()}
function pSkill(i){const sk=P.skills[i];if(P.mp<sk.cost){aLog("Not enough MP!");return}P.mp-=sk.cost;sfx("atk");
if(sk.heal){const h=Math.floor(sk.heal*(0.9+Math.random()*0.2));P.hp=Math.min(P.mhp,P.hp+h);sfx("heal");aLog(sk.cn+"! +"+h+" HP!")}
else{const{dmg,crit}=calcDmg(P.atk,bd.en.def.def,sk.pow,P.luck);bd.en.hp-=dmg;aLog(sk.cn+"! "+dmg+" dmg!"+(crit?" CRIT!":""));bd.shake=10;if(crit)P.luck=Math.min(100,P.luck+1)}chkBEnd()}
function pItem(i){const inv=P.inv[i];if(!inv||inv.cnt<=0)return;const it=ITD[inv.id];inv.cnt--;sfx("item");
if(it.type==="heal_hp"){P.hp=Math.min(P.mhp,P.hp+it.val);aLog(it.cn+"! +"+it.val+" HP!")}
else if(it.type==="heal_mp"){P.mp=Math.min(P.mmp,P.mp+it.val);aLog(it.cn+"! +"+it.val+" MP!")}
else if(it.type==="damage"){bd.en.hp-=it.val;aLog(it.cn+"! "+it.val+" dmg!");bd.shake=10}
if(inv.cnt<=0)P.inv.splice(i,1);chkBEnd()}

function eTurn(){

const pow=e.sp?e.sp[si]:1.0;const{dmg}=calcDmg(e.atk,P.def,pow,0);
P.hp-=dmg;sfx("hit");aLog(e.cn+" uses "+e.sk[si]+"! "+dmg+" dmg!");bd.flash=10;

function chkBEnd(){
if(bd.en.hp<=0){bd.en.hp=0;const e=bd.en.def;const xg=e.exp;const gg=e.gold;
const dc=0.3+P.luck*0.005;let drp=null;

for(let inv of P.inv){if(inv.id===ii){inv.cnt++;f=true;break}}

}
if(bd.sub==="SKILL"){
if(ck("ArrowUp")){bd.si=Math.max(0,bd.si-1);sfx("sel")}
if(ck("ArrowDown")){bd.si=Math.min(P.skills.length-1,bd.si+1);sfx("sel")}
if(ck("Escape")||ck("Backspace")){bd.sub=null;sfx("sel")}
if(ck("Enter")||ck(" ")){sfx("cfm");pSkill(bd.si);
if(bd.phase==="MENU"){bd.sub=null;eTurn()}}
return;
}
if(bd.sub==="ITEM"){
if(ck("ArrowUp")){bd.si=Math.max(0,bd.si-1);sfx("sel")}
if(ck("ArrowDown")){bd.si=Math.min(Math.max(0,P.inv.length-1),bd.si+1);sfx("sel")}
if(ck("Escape")||ck("Backspace")){bd.sub=null;sfx("sel")}
if(ck("Enter")||ck(" ")){if(P.inv.length>0){sfx("cfm");pItem(bd.si);
if(bd.phase==="MENU"){bd.sub=null;eTurn()}}}
return;
}
if(ck("ArrowLeft")){bd.mi=Math.max(0,bd.mi-1);sfx("sel")}
if(ck("ArrowRight")){bd.mi=Math.min(3,bd.mi+1);sfx("sel")}
if(ck("Enter")||ck(" ")){
sfx("cfm");
switch(bd.mi){
case 0:pAtk();if(bd.phase==="MENU")eTurn();break;
case 1:bd.sub="SKILL";bd.si=0;break;
case 2:bd.sub="ITEM";bd.si=0;break;
case 3:tryFlee();break;
}
}
}

function showDialog(ts,cb){dd={txts:ts,idx:0,cb:cb};gs="DIALOG"}

function updDialog(){
if(!dd)return;
if(ck("Enter")||ck(" ")){
dd.idx++;
if(dd.idx>=dd.txts.length){
const c=dd.cb;dd=null;gs="MAP";
if(c)c();
}
}
}

function drawDialog(){
drawMap();
ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,0,CW,CH);
ctx.fillStyle="#1a1a2e";ctx.fillRect(20,CH-100,CW-40,90);
ctx.strokeStyle="#88F";ctx.strokeRect(20,CH-100,CW-40,90);
if(dd&&dd.idx<dd.txts.length){
dt(35,CH-85,dd.txts[dd.idx],"#FFF",1);
dt(CW-80,CH-25,"ENTER>>","#AAF",1);
}
}

function drawHUD(){
ctx.fillStyle="rgba(0,0,0,0.75)";ctx.fillRect(0,0,CW,36);
ctx.strokeStyle="#555";ctx.strokeRect(0,0,CW,36);
drawBar(8,4,120,8,P.hp,P.mhp,"#E44","#400");
drawBar(8,16,120,6,P.mp,P.mmp,"#48F","#024");
dt(135,3,"HP:"+P.hp+"/"+P.mhp,"#FFF",1);
dt(135,13,"MP:"+P.mp+"/"+P.mmp,"#CCC",1);
dt(135,23,"Lv."+P.lv+" EXP:"+P.exp+"/"+expNext(P.lv)+" G:"+P.gold,"#FF0",1);
dt(CW-100,3,"Q:Menu R:Rate","#888",1);
dt(CW-140,15,"Quest:"+(QS.stage<3?["Talk Elder","Beat Boss","Report"][QS.stage]:"Complete!"),"#ADF",1);
}

function drawMap(){
const camX=Math.max(0,Math.min(P.x-STX/2|0,MW-STX));
const camY=Math.max(0,Math.min(P.y-STY/2|0,MH-STY));
for(let sy=0;sy<STY;sy++){
for(let sx=0;sx<STX;sx++){
const mx=camX+sx,my=camY+sy;
if(mx>=0&&mx<MW&&my>=0&&my<MH)drawTile(sx,sy,MAP[my][mx],gf);
}
}
for(let e of me){
if(!e.alive)continue;
const sx=e.x-camX,sy=e.y-camY;
if(sx>=0&&sx<STX&&sy>=0&&sy<STY)drawMon(sx*TILE+TILE/2,sy*TILE+TILE-2,e.d,gf,0.8);
}
const psx=P.x-camX,psy=P.y-camY;
drawPlayer(psx*TILE,psy*TILE,P.frame);
drawHUD();
}

function updMap(){
if(menuO||ratO)return;
P.mt--;
let dx=0,dy=0;
if(keys["ArrowUp"]||keys["w"]||keys["W"])dy=-1;
if(keys["ArrowDown"]||keys["s"]||keys["S"])dy=1;
if(keys["ArrowLeft"]||keys["a"]||keys["A"])dx=-1;
if(keys["ArrowRight"]||keys["d"]||keys["D"])dx=1;
if((dx||dy)&&P.mt<=0){
const nx=P.x+dx,ny=P.y+dy;
if(!blocked(nx,ny)){P.x=nx;P.y=ny;P.mt=6;P.sc++;updExpl();
P.luck=Math.max(0,P.luck-0.01);
if(P.sc%50===0)P.luck=Math.min(100,P.luck+3);
}
P.frame++;
}
for(let e of me){
if(!e.alive)continue;
e.mt--;
if(e.mt<=0){
e.mt=15+Math.floor(Math.random()*20);
const dirs=[[0,-1],[0,1],[-1,0],[1,0],[0,0]];
const d=dirs[Math.floor(Math.random()*dirs.length)];
const nx=e.x+d[0],ny=e.y+d[1];
if(nx>=0&&nx<MW&&ny>=0&&ny<MH&&!blocked(nx,ny)){e.x=nx;e.y=ny;}
}
if(e.alive&&e.x===P.x&&e.y===P.y){
startBattle(e.d,false);
e.alive=false;
const idx=me.indexOf(e);
if(idx>=0)me.splice(idx,1);
if(me.length<8)spawnE();
break;
}
}
if(ck("Enter")||ck(" ")){
checkNPC();
}
if(ck("q")||ck("Q")){menuO=true;sfx("sel");}
if(ck("r")||ck("R")){ratO=true;sfx("sel");}
}

function checkNPC(){
const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
for(const[dx,dy]of dirs){
const nx=P.x+dx,ny=P.y+dy;
if(nx>=0&&nx<MW&&ny>=0&&ny<MH){
const t=MAP[ny][nx];
if(t===T.NPC){
if(QS.stage===0){
QS.stage=1;
showDialog(["Elder: Hero! The Dark Knight threatens our land!","Elder: Cross the bridge to the east, find and defeat him!","Elder: Return to me when the deed is done!"],()=>{sfx("cfm");});
}else if(QS.stage===2){
QS.stage=3;QS.done=true;
showDialog(["Elder: You defeated the Dark Knight!","Elder: Our land is saved! Thank you, Hero!","Elder: You are the true champion!"],()=>{sfx("lvup");ratO=true;});
}else if(QS.stage===1){
showDialog(["Elder: The Dark Knight awaits in the dark fortress to the east!"],()=>{});
}else{
showDialog(["Elder: Thank you for saving our land!"],()=>{});
}
return true;
}
if(t===T.BOSSNPC){
if(QS.stage===1&&!QS.bossDown){
showDialog(["Dark Knight: You dare challenge me?! Come then!"],()=>{startBattle(BD,true);});
}else if(QS.bossDown){
showDialog(["The Dark Knight has been defeated."],()=>{});
}
return true;
}
if(t===T.CHEST){
P.inv.push({id:Math.floor(Math.random()*3),cnt:1});
MAP[ny][nx]=T.GRASS;
showDialog(["Found a treasure chest! Got an item!"],()=>{sfx("item");});
return true;
}
}
}
return false;
}

let menuIdx=0;
function drawMenu(){
ctx.fillStyle="rgba(0,0,0,0.85)";ctx.fillRect(0,0,CW,CH);
ctx.fillStyle="#1a1a2e";ctx.fillRect(50,40,CW-100,CH-80);
ctx.strokeStyle="#88F";ctx.strokeRect(50,40,CW-100,CH-80);
dtc(55,"STATUS","#FF0",2);
const items=["Level: "+P.lv,"HP: "+P.hp+"/"+P.mhp,"MP: "+P.mp+"/"+P.mmp,"ATK: "+P.atk,"DEF: "+P.def,"AGI: "+P.agi,"EXP: "+P.exp+"/"+expNext(P.lv),"Gold: "+P.gold,"Battles Won: "+P.bw,"Steps: "+P.sc,"Deaths: "+P.dc,"Explore: "+explPct()+"%"];
for(let i=0;i<items.length;i++){
const y=90+i*18;
ctx.fillStyle=i===menuIdx?"rgba(255,255,100,0.2)":"transparent";
ctx.fillRect(70,y,CW-140,16);
dt(80,y+3,items[i],"#FFF",1);
}
dtc(CH-55,"Press Q or ESC to close","#888",1);
}

function updMenu(){
if(ck("ArrowUp")){menuIdx=Math.max(0,menuIdx-1);sfx("sel");}
if(ck("ArrowDown")){menuIdx=Math.min(11,menuIdx+1);sfx("sel");}
if(ck("q")||ck("Q")||ck("Escape")){menuO=false;sfx("sel");}
}

function calcRating(){
const bw=Math.min(P.bw*10,250);
const exp=Math.min(P.exp*0.5+P.lv*20,200);
const ep=explPct()*2;
const time=Math.max(0,300-Math.floor((Date.now()-gst)/1000));
const dc=Math.max(0,100-P.dc*50);
const cm=QS.done?150:0;
const total=bw+exp+ep+time+dc+cm;
let grade="D",col="#888";
if(total>=900){grade="S";col="#FF0";}
else if(total>=750){grade="A";col="#0F0";}
else if(total>=600){grade="B";col="#08F";}
else if(total>=400){grade="C";col="#F80";}
return{bw,exp,ep,time,dc,cm,total,grade,col};
}

function drawRating(){
const r=calcRating();
ctx.fillStyle="rgba(0,0,0,0.9)";ctx.fillRect(0,0,CW,CH);
ctx.fillStyle="#1a1a2e";ctx.fillRect(60,30,CW-120,CH-60);
ctx.strokeStyle="#88F";ctx.strokeRect(60,30,CW-120,CH-60);
dtc(45,"ADVENTURE RATING","#FF0",2);
const items=[
["Battles Won",r.bw+"/250"],
["Level & EXP",r.exp+"/200"],
["Explore %",r.ep+"/200"],
["Speed Bonus",r.time+"/300"],
["Death Penalty",r.dc+"/100"],
["Quest Complete",r.cm+"/150"],
];
for(let i=0;i<items.length;i++){
const y=85+i*22;
dt(90,y+3,items[i][0],"#FFF",1);
dt(CW-160,y+3,items[i][1],"#ADF",1);
}
ctx.strokeStyle="#888";
ctx.beginPath();ctx.moveTo(80,220);ctx.lineTo(CW-80,220);ctx.stroke();
dt(90,230,"TOTAL","#FF0",2);
dt(CW-160,230,r.total+"/1200","#FF0",2);
dtc(270,"GRADE: "+r.grade,r.col,4);
dt(70,320,"Play Time: "+Math.floor((Date.now()-gst)/60000)+"m "+Math.floor(((Date.now()-gst)/1000)%60)+"s","#888",1);
dtc(CH-50,"Press R or ESC to close","#888",1);
}

function updRating(){
if(ck("r")||ck("R")||ck("Escape")){ratO=false;sfx("sel");}
}

function drawTitle(){
ctx.fillStyle="#111";ctx.fillRect(0,0,CW,CH);
for(let i=0;i<50;i++){
ctx.fillStyle="rgba(100,150,255,"+(0.1+Math.random()*0.1)+")";
ctx.fillRect(Math.random()*CW,Math.random()*CH,2,2);
}
const bn=Math.sin(gf*0.05)*5;
dtc(80+bn,"PIXEL","#48F",4);
dtc(120+bn,"LEGEND","#F44",4);
dtc(160+bn,"OF HERO","#4F4",4);
dtc(220,"A Retro RPG Adventure","#AAA",1);
dtc(280,"Arrow Keys/WASD - Move","#888",1);
dtc(300,"Enter/Space - Interact","#888",1);
dtc(320,"Q - Menu  R - Rating","#888",1);
if(gf%60<30){
dtc(350,"Press ENTER to Start","#FFF",1);
}
}

function updTitle(){
if(ck("Enter")||ck(" ")){
gs="MAP";
gst=Date.now();
startFBGM();
sfx("cfm");
}
}

function gameLoop(){
gf++;
if(actx)chkBGMLoop();
if(gs==="TITLE"){updTitle();drawTitle();}
else if(gs==="MAP"){updMap();drawMap();if(menuO){updMenu();drawMenu();}if(ratO){updRating();drawRating();}}
else if(gs==="BATTLE"){updBattle();drawBattle();}
else if(gs==="DIALOG"){updDialog();drawDialog();}
kp={};
requestAnimationFrame(gameLoop);
}
gameLoop();
</script>

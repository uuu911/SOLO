function mkEnemySpr(c1,c2,c3,c4){
  const d=[];
  for(let y=0;y<16;y++){for(let x=0;x<16;x++){
    const dx=Math.abs(x-7.5),dy=Math.abs(y-7.5);
    if(dx+dy<3)d.push(c1);else if(dx<7&&dy<7&&dx+dy<10)d.push(c2);else if(dx<7&&dy<7)d.push(c3);else if(dx<6&&dy<6&&(x+y)%3===0)d.push(c4);else d.push(0);
  }}return mkSpr(16,16,d);
}

  }
  function close(){isOpen=false;}
  function isOpen_(){return isOpen;}
  function getSelected(){return selectedIdx;}

  function buy(){

    if(item.type==='armor'&&ch.equipped.armor===itemId){msg='Unequip first!';msgTimer=90;return;}

defineModule('battle',function(){
  let battleState=null;

  function startBattle(enemyId){
    const en=mod('data').getEnemy(enemyId);
    if(!en)return;
    const ch=mod('character').getState();
    battleState={
      phase:'player_turn',
      enemy:Object.assign({},en,{currentHp:en.hp}),
      playerHp:ch.hp,playerMaxHp:ch.maxHp,playerMp:ch.mp,playerMaxMp:ch.maxMp,
      playerAtk:ch.atk,playerDef:ch.def,playerSpd:ch.spd,playerMag:ch.mag,
      turnCount:0,usedItem:false,hadCrit:false,playerDefending:false,
      message:'',messageTimer:0,
      animPhase:null,animTimer:0,
      subMenu:null,subMenuIdx:0,
      playerSkills:ch.skills.slice(),playerInventory:ch.inventory.slice(),
      fled:false,won:false,lost:false,
      damageDealt:0
    };
  }

  function getState(){return battleState;}

  function isOver(){return battleState&&(battleState.won||battleState.lost||battleState.fled);}

  function getResult(){
    if(!battleState)return null;
    return{won:battleState.won,lost:battleState.lost,fled:battleState.fled,exp:battleState.won?battleState.enemy.exp:0,gold:battleState.won?battleState.enemy.gold:0,turnCount:battleState.turnCount,usedItem:battleState.usedItem,hadCrit:battleState.hadCrit,hpRatio:battleState.playerHp/battleState.playerMaxHp,enemyId:battleState.enemy.id};
  }

  function calcDamage(atk,def,mult){
    mult=mult||1.0;
    const base=Math.max(1,Math.floor(atk*mult-def*0.5));
    const variance=Math.floor(Math.random()*5)-2;
    const crit=Math.random()<0.1;
    let dmg=base+variance;if(crit)dmg=Math.floor(dmg*1.5);
    return{damage:Math.max(1,dmg),crit:crit};
  }

  function playerAttack(){
    if(!battleState||battleState.phase!=='player_turn')return;
    battleState.playerDefending=false;
    const result=calcDamage(battleState.playerAtk,battleState.enemy.def);
    if(result.crit)battleState.hadCrit=true;
    battleState.enemy.currentHp=Math.max(0,battleState.enemy.currentHp-result.damage);
    battleState.message='You deal '+result.damage+' dmg!'+(result.crit?' CRITICAL!':'');
    battleState.messageTimer=60;battleState.animPhase='player_attack';battleState.animTimer=30;
    battleState.damageDealt=result.damage;battleState.turnCount++;
    mod('audio').playSFX('attack');
    if(battleState.enemy.currentHp<=0){setTimeout(()=>{battleState.won=true;battleState.phase='end';mod('audio').playSFX('victory');},800);}
    else{setTimeout(()=>enemyTurn(),700);}
    battleState.phase='animating';
  }

  function playerSkill(skillId){
    if(!battleState||battleState.phase!=='player_turn')return;
    const skill=mod('data').getSkill(skillId);
    if(!skill)return;
    if(battleState.playerMp<skill.mpCost){battleState.message='Not enough MP!';battleState.messageTimer=40;return;}
    battleState.playerMp-=skill.mpCost;
    battleState.playerDefending=false;
    if(skill.type==='damage'){
      const result=calcDamage(battleState.playerAtk,battleState.enemy.def,skill.multiplier);
      if(result.crit)battleState.hadCrit=true;
      battleState.enemy.currentHp=Math.max(0,battleState.enemy.currentHp-result.damage);
      battleState.message=skill.name+'! '+result.damage+' dmg!'+(result.crit?' CRIT!':'');
    }else if(skill.type==='heal'){
      const healAmt=Math.floor(battleState.playerMag*skill.healMultiplier);
      battleState.playerHp=Math.min(battleState.playerMaxHp,battleState.playerHp+healAmt);
      battleState.message=skill.name+'! HP +'+healAmt;
    }else if(skill.type==='buff'){
      battleState.playerDefending=true;
      battleState.message=skill.name+'! DEF boosted!';
    }
    battleState.messageTimer=60;battleState.animPhase='player_skill';battleState.animTimer=30;
    battleState.turnCount++;mod('audio').playSFX('skill');
    if(skill.type==='damage'&&battleState.enemy.currentHp<=0){setTimeout(()=>{battleState.won=true;battleState.phase='end';mod('audio').playSFX('victory');},800);}
    else{setTimeout(()=>enemyTurn(),700);}
    battleState.phase='animating';
  }

  function playerUseItem(itemId){
    if(!battleState||battleState.phase!=='player_turn')return;
    const item=mod('data').getItem(itemId);
    if(!item||item.type!=='consumable')return;
    if(!mod('character').hasItem(itemId)){battleState.message='No item!';battleState.messageTimer=40;return;}
    mod('character').removeItem(itemId);
    const invIdx=battleState.playerInventory.indexOf(itemId);if(invIdx>=0)battleState.playerInventory.splice(invIdx,1);
    battleState.usedItem=true;battleState.playerDefending=false;
    if(item.effect==='heal'){battleState.playerHp=Math.min(battleState.playerMaxHp,battleState.playerHp+item.value);battleState.message='Used '+item.name+'! HP+'+item.value;}
    else if(item.effect==='mp'){battleState.playerMp=Math.min(battleState.playerMaxMp,battleState.playerMp+item.value);battleState.message='Used '+item.name+'! MP+'+item.value;}
    else{battleState.message='Used '+item.name+'!';}
    battleState.messageTimer=60;battleState.animPhase='player_item';battleState.animTimer=30;
    battleState.turnCount++;mod('audio').playSFX('confirm');
    setTimeout(()=>enemyTurn(),700);battleState.phase='animating';
  }

  function playerDefend(){
    if(!battleState||battleState.phase!=='player_turn')return;
    battleState.playerDefending=true;battleState.turnCount++;
    battleState.message='You brace yourself!';battleState.messageTimer=60;
    battleState.animPhase='player_defend';battleState.animTimer=30;
    mod('audio').playSFX('block');
    setTimeout(()=>enemyTurn(),700);battleState.phase='animating';
  }

  function playerFlee(){
    if(!battleState||battleState.phase!=='player_turn')return;
    const chance=0.3+battleState.playerSpd*0.03;
    if(Math.random()<chance){battleState.fled=true;battleState.phase='end';battleState.message='Escaped!';battleState.messageTimer=60;}
    else{battleState.message='Failed to flee!';battleState.messageTimer=60;battleState.turnCount++;setTimeout(()=>enemyTurn(),700);}
    battleState.phase='animating';
  }

  function enemyTurn(){
    if(!battleState)return;
    const en=battleState.enemy;
    let def=battleState.playerDef;
    if(battleState.playerDefending)def*=2;
    const result=calcDamage(en.atk,def);
    battleState.playerHp=Math.max(0,battleState.playerHp-result.damage);
    const blocked=battleState.playerDefending;
    battleState.message=en.name+' attacks! '+result.damage+' dmg!'+(blocked?' (Blocked!)':'')+(result.crit?' CRIT!':'');
    if(result.crit)battleState.hadCrit=true;
    battleState.messageTimer=60;battleState.animPhase='enemy_attack';battleState.animTimer=30;
    mod('audio').playSFX('hit');
    if(battleState.playerHp<=0){setTimeout(()=>{battleState.lost=true;battleState.phase='end';},800);}
    else{setTimeout(()=>{battleState.phase='player_turn';battleState.playerDefending=false;},700);}
  }

  function update(){
    if(!battleState)return;
    if(battleState.messageTimer>0)battleState.messageTimer--;
    if(battleState.animTimer>0){battleState.animTimer--;if(battleState.animTimer<=0)battleState.animPhase=null;}
  }

  function applyResult(){
    if(!battleState)return;
    const dmg=mod('character').getState().hp-battleState.playerHp;
    if(dmg>0)mod('character').takeDamage(dmg);
    else mod('character').heal(-dmg);
    if(battleState.won){
      const lvled=mod('character').addExp(battleState.enemy.exp);
      mod('character').addGold(battleState.enemy.gold);
      if(lvled)mod('audio').playSFX('levelup');
    }
    battleState=null;
  }

  return{startBattle,getState,isOver,getResult,playerAttack,playerSkill,playerUseItem,playerDefend,playerFlee,update,applyResult};
});

defineModule('evaluation',function(){
  let evalData=null;let showDetails=false;let selectedBtn=0;

  function show(result){
    const score=calculateScore(result);
    evalData={score,grade:getGrade(score),details:result};
    showDetails=false;selectedBtn=0;
  }

  function calculateScore(r){
    const hpScore=Math.floor(r.hpRatio*30);
    const turnBase=Math.max(0,30-r.turnCount*3);const turnScore=Math.min(30,turnBase);
    const itemPenalty=r.usedItem?5:0;
    const critBonus=r.hadCrit?10:0;
    const combo=r.hadCrit&&!r.usedItem?5:0;
    const total=Math.min(100,Math.max(0,hpScore+turnScore-itemPenalty+critBonus+combo));
    return total;
  }

  function getGrade(score){
    if(score>=90)return'S';if(score>=75)return'A';if(score>=60)return'B';if(score>=40)return'C';return'D';
  }

  function getData(){return evalData;}
  function isShowingDetails(){return showDetails;}
  function getSelectedBtn(){return selectedBtn;}
  function toggleDetails(){showDetails=!showDetails;}
  function moveBtn(dir){selectedBtn=(selectedBtn+dir+2)%2;}
  function reset(){evalData=null;showDetails=false;selectedBtn=0;}

  return{show,getData,isShowingDetails,getSelectedBtn,toggleDetails,moveBtn,reset,calculateScore,getGrade};
});

defineModule('input',function(){
  const keys={};
  const justPressed={};
  let listeners=[];

  function init(){
    window.addEventListener('keydown',function(e){
      if(!keys[e.code])justPressed[e.code]=true;
      keys[e.code]=true;e.preventDefault();
    });
    window.addEventListener('keyup',function(e){keys[e.code]=false;});
  }

  function isDown(code){return!!keys[code];}
  function wasPressed(code){if(justPressed[code]){justPressed[code]=false;return true;}return false;}
  function clearJustPressed(){for(const k in justPressed)justPressed[k]=false;}
  function onKey(cb){listeners.push(cb);}

  return{init,isDown,wasPressed,clearJustPressed,onKey};
});

defineModule('game',function(){
  let canvas,ctx,offCanvas,offCtx;
  let gameState='title';
  let menuIdx=0;
  let playerMoving=false;
  let playerMoveTimer=0;
  let playerMoveFrom={x:0,y:0};
  let playerMoveTo={x:0,y:0};
  let fadeAlpha=0;
  let fadeDir=0;
  let fadeTarget=null;
  let fadeCallback=null;
  let stepCounter=0;
  let messageText='';
  let messageTimer=0;
  let menuState='main';
  let menuSelIdx=0;
  let lastTime=0;
  let gameStarted=false;

  function init(){
    canvas=document.getElementById('game');
    canvas.width=SCREEN_W*SCALE;canvas.height=SCREEN_H*SCALE;
    ctx=canvas.getContext('2d');
    ctx.imageSmoothingEnabled=false;
    offCanvas=document.createElement('canvas');
    offCanvas.width=SCREEN_W;offCanvas.height=SCREEN_H;

    mod('ui').init(offCtx);
    mod('input').init();
    lastTime=performance.now();
    requestAnimationFrame(gameLoop);
  }

  function gameLoop(ts){
    const dt=Math.min(50,ts-lastTime);lastTime=ts;
    update(dt);render();
    mod('input').clearJustPressed();
    requestAnimationFrame(gameLoop);
  }

  function update(dt){
    mod('shop').update();
    if(messageTimer>0)messageTimer--;
    if(fadeDir!==0){
      fadeAlpha+=fadeDir*0.05;
      if(fadeDir>0&&fadeAlpha>=1){fadeAlpha=1;fadeDir=0;if(fadeCallback)fadeCallback();fadeCallback=null;}
      if(fadeDir<0&&fadeAlpha<=0){fadeAlpha=0;fadeDir=0;}
      return;
    }
    if(gameState==='title')updateTitle();
    else if(gameState==='map')updateMap(dt);
    else if(gameState==='battle')updateBattle();
    else if(gameState==='shop')updateShop();
    else if(gameState==='menu')updateMenu();
    else if(gameState==='evaluation')updateEvaluation();
    else if(gameState==='gameover')updateGameOver();
  }

  function updateTitle(){
    if(mod('input').wasPressed('ArrowUp')){menuIdx=Math.max(0,menuIdx-1);mod('audio').playSFX('select');}
    if(mod('input').wasPressed('ArrowDown')){menuIdx=Math.min(1,menuIdx+1);mod('audio').playSFX('select');}
    if(mod('input').wasPressed('Enter')||mod('input').wasPressed('Space')){
      mod('audio').playSFX('confirm');mod('audio').resumeContext();
      if(menuIdx===0){
        mod('character').reset();
        const ch=mod('character').getState();
        playerMoving=false;fadeAlpha=0;
        gameState='map';mod('audio').playBGM('town');gameStarted=true;
      }else{
        const data=mod('save').load();
        if(data){
          mod('character').setState(data);
          gameState='map';mod('audio').playBGM('town');gameStarted=true;playerMoving=false;fadeAlpha=0;
        }else{messageText='No save data!';messageTimer=90;}
      }
    }
  }

  function updateMap(dt){
    if(playerMoving){
      playerMoveTimer-=dt;
      if(playerMoveTimer<=0){
        playerMoving=false;
        const ch=mod('character').getState();
        const trans=mod('gamemap').checkTransition(ch.mapId,ch.x,ch.y);
        if(trans){
          startFade(1,function(){
            mod('character').setState(Object.assign(mod('character').getState(),{x:trans.targetX,y:trans.targetY,mapId:trans.targetMap}));
            playerMoving=false;
            const zone=mod('gamemap').getMap(trans.targetMap).zone;
            mod('audio').playBGM('town');
            startFade(-1);
          });
          return;
        }
        const zone=mod('gamemap').getMap(ch.mapId).zone;
        const rate=mod('data').getEncounterRate(zone);

        if(rate>0&&stepCounter>=3&&Math.random()<rate){

          if(enemies.length>0){
            const eid=enemies[Math.floor(Math.random()*enemies.length)];

    if(menuState==='main'){
      if(inp.wasPressed('ArrowUp')){menuSelIdx=Math.max(0,menuSelIdx-1);mod('audio').playSFX('select');}
      if(inp.wasPressed('ArrowDown')){menuSelIdx=Math.min(4,menuSelIdx+1);mod('audio').playSFX('select');}
      if(inp.wasPressed('Enter')||inp.wasPressed('Space')){
        mod('audio').playSFX('confirm');
        if(menuSelIdx===0)menuState='status';
        else if(menuSelIdx===1)menuState='inventory';
        else if(menuSelIdx===2){mod('save').save();messageText='Game saved!';messageTimer=90;}
        else if(menuSelIdx===3)menuState='equip';
        else if(menuSelIdx===4){gameState='map';return;}
        menuSelIdx=0;
      }
    }else{
      if(inp.wasPressed('Escape')){menuState='main';menuSelIdx=0;return;}
      if(menuState==='inventory'){
        const ch=mod('character').getState();
        if(inp.wasPressed('ArrowUp')){menuSelIdx=Math.max(0,menuSelIdx-1);mod('audio').playSFX('select');}
        if(inp.wasPressed('ArrowDown')){menuSelIdx=Math.min(ch.inventory.length-1,menuSelIdx+1);mod('audio').playSFX('select');}
        if((inp.wasPressed('Enter')||inp.wasPressed('Space'))&&menuSelIdx<ch.inventory.length){
          const iid=ch.inventory[menuSelIdx];
          const it=mod('data').getItem(iid);
          if(it&&(it.type==='weapon'||it.type==='armor')){
            mod('character').equip(iid);mod('audio').playSFX('confirm');
          }else if(it&&it.type==='consumable'){
            if(it.effect==='heal'){mod('character').heal(it.value);messageText='HP+'+it.value;}
            else if(it.effect==='mp'){mod('character').healMp(it.value);messageText='MP+'+it.value;}
            mod('character').removeItem(iid);mod('audio').playSFX('confirm');messageTimer=60;
          }
        }
      }else if(menuState==='equip'){
        const ch=mod('character').getState();
        const opts=[ch.equipped.weapon||'None',ch.equipped.armor||'None'];
        if(inp.wasPressed('ArrowUp')){menuSelIdx=Math.max(0,menuSelIdx-1);mod('audio').playSFX('select');}
        if(inp.wasPressed('ArrowDown')){menuSelIdx=Math.min(1,menuSelIdx+1);mod('audio').playSFX('select');}
        if(inp.wasPressed('Enter')||inp.wasPressed('Space')){
          mod('audio').playSFX('confirm');
        }
      }
    }
  }

  function updateEvaluation(){
    const inp=mod('input');
    if(inp.wasPressed('ArrowLeft')||inp.wasPressed('ArrowRight')){mod('evaluation').moveBtn(inp.wasPressed('ArrowRight')?1:-1);mod('audio').playSFX('select');}
    if(inp.wasPressed('Enter')||inp.wasPressed('Space')){
      mod('audio').playSFX('confirm');
      const btn=mod('evaluation').getSelectedBtn();
      if(btn===0){
        const result=mod('evaluation').getData().details;
        mod('evaluation').reset();
        mod('battle').applyResult();
        startBattle(result.enemyId);
      }else{
        mod('evaluation').reset();
        mod('battle').applyResult();
        gameState='map';mod('audio').playBGM('town');
        mod('save').save();
      }
    }
    if(inp.wasPressed('KeyD')){mod('evaluation').toggleDetails();}
  }

  function updateGameOver(){
    if(mod('input').wasPressed('Enter')||mod('input').wasPressed('Space')){
      if(menuIdx===0){mod('character').reset();gameState='map';mod('audio').playBGM('town');playerMoving=false;}
      else{gameState='title';menuIdx=0;mod('audio').stopBGM();}
    }
    if(mod('input').wasPressed('ArrowUp')||mod('input').wasPressed('ArrowDown')){menuIdx=1-menuIdx;mod('audio').playSFX('select');}
  }

  function startFade(dir,cb){
    fadeDir=dir;fadeCallback=cb||null;
  }

  function render(){
    const ui=mod('ui');ui.clear(C.BLACK);
    if(gameState==='title')renderTitle();
    else if(gameState==='map')renderMap();
    else if(gameState==='battle')renderBattle();
    else if(gameState==='shop')renderShop();
    else if(gameState==='menu')renderMenu();
    else if(gameState==='evaluation')renderEvaluation();
    else if(gameState==='gameover')renderGameOver();
    if(messageTimer>0){
      const mw=ui.getTextWidth(messageText,2)+20;
      ui.createWindow(SCREEN_W/2-mw/2,SCREEN_H-60,mw,30,C.WHITE,C.BLACK);
      ui.drawText(messageText,SCREEN_W/2-mw/2+10,SCREEN_H-50,C.WHITE,2);
    }
    if(fadeAlpha>0){
      ui.fillRect(0,0,SCREEN_W,SCREEN_H,C.BLACK);
    }
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(offCanvas,0,0,SCREEN_W,SCREEN_H,0,0,SCREEN_W*SCALE,SCREEN_H*SCALE);
    if(fadeAlpha>0){
      ctx.globalAlpha=Math.min(1,fadeAlpha);
      ctx.fillStyle='#000';ctx.fillRect(0,0,SCREEN_W*SCALE,SCREEN_H*SCALE);
      ctx.globalAlpha=1;
    }
  }

  function renderTitle(){
    const ui=mod('ui');
    ui.fillRect(0,0,SCREEN_W,SCREEN_H/2-30,C.DBLUE);
    ui.fillRect(0,SCREEN_H/2-30,SCREEN_W,SCREEN_H,C.BLACK);
    ui.drawText('PIXEL QUEST',SCREEN_W/2-ui.getTextWidth('PIXEL QUEST',4)/2,80,C.YELLOW,4);
    ui.drawText('A Retro Adventure',SCREEN_W/2-ui.getTextWidth('A Retro Adventure',2)/2,140,C.LGRAY,2);
    const opts=['New Game','Continue'];
    for(let i=0;i<opts.length;i++){
      const col=i===menuIdx?C.WHITE:C.GRAY;
      const tx=SCREEN_W/2-ui.getTextWidth(opts[i],2)/2;
      if(i===menuIdx)ui.drawText('>',tx-20,220+i*30,C.YELLOW,2);
      ui.drawText(opts[i],tx,220+i*30,col,2);
    }
    ui.drawText('Arrow Keys:Move  Enter:Confirm  Esc:Menu',SCREEN_W/2-ui.getTextWidth('Arrow Keys:Move  Enter:Confirm  Esc:Menu',1)/2,SCREEN_H-40,C.GRAY,1);
  }

  function renderMap(){
    const ui=mod('ui');const ch=mod('character').getState();
    const mapData=mod('gamemap').getMap(ch.mapId);
    const tiles=mapData.tiles;
    let drawX=ch.x,drawY=ch.y;
    if(playerMoving){
      const t=1-playerMoveTimer/200;
      drawX=playerMoveFrom.x+(playerMoveTo.x-playerMoveFrom.x)*t;
      drawY=playerMoveFrom.y+(playerMoveTo.y-playerMoveFrom.y)*t;
    }
    const camX=Math.max(0,Math.min(drawX*TILE_SIZE-SCREEN_W/2+TILE_SIZE/2,MAP_COLS*TILE_SIZE-SCREEN_W));
    const camY=Math.max(0,Math.min(drawY*TILE_SIZE-SCREEN_H/2+TILE_SIZE/2,MAP_ROWS*TILE_SIZE-SCREEN_H));
    const startCol=Math.floor(camX/TILE_SIZE);const startRow=Math.floor(camY/TILE_SIZE);
    const endCol=Math.min(MAP_COLS-1,startCol+Math.ceil(SCREEN_W/TILE_SIZE)+1);
    const endRow=Math.min(MAP_ROWS-1,startRow+Math.ceil(SCREEN_H/TILE_SIZE)+1);
    for(let r=startRow;r<=endRow;r++){
      for(let c=startCol;c<=endCol;c++){
        const tileName=tiles[r][c];
        const tileSpr=TileMap[tileName]||TILES.grass;
        ui.drawSprite(tileSpr,c*TILE_SIZE-camX,r*TILE_SIZE-camY);
      }
    }
    let px=drawX*TILE_SIZE-camX,py=drawY*TILE_SIZE-camY;
    const sprKey='hero_'+(ch.facing||'down');
    ui.drawSprite(SPRITES[sprKey]||SPRITES.hero_down,px,py);
    ui.createWindow(0,SCREEN_H-50,SCREEN_W,50,C.WHITE,C.BLACK);
    ui.drawText(ch.name+' Lv'+ch.level,10,SCREEN_H-42,C.WHITE,2);
    ui.drawText('HP:',140,SCREEN_H-42,C.WHITE,2);ui.drawHPBar(170,SCREEN_H-38,80,ch.hp,ch.maxHp);
    ui.drawText('MP:',270,SCREEN_H-42,C.BLUE,2);ui.drawHPBar(300,SCREEN_H-38,60,ch.mp,ch.maxMp,C.BLUE);
    ui.drawText('G:'+ch.gold,380,SCREEN_H-42,C.YELLOW,2);
    const zone=mapData.zone;
    ui.drawText(zone.toUpperCase(),500,SCREEN_H-42,C.LGRAY,2);
  }

  function renderBattle(){
    const ui=mod('ui');const bs=mod('battle').getState();
    if(!bs)return;
    ui.fillRect(0,0,SCREEN_W,SCREEN_H,C.BLACK);
    for(let y=0;y<8;y++){for(let x=0;x<SCREEN_W;x+=2){
      if((x+y*3)%7<3)ui.fillRect(x,y*2,2,2,42);
    }}
    ui.fillRect(0,16,SCREEN_W,SCREEN_H-16,C.BLACK);
    const enSpr=SPRITES[bs.enemy.sprite];
    let enX=SCREEN_W/2-8,enY=60;
    if(bs.animPhase==='player_attack'||bs.animPhase==='player_skill'){enX+=Math.sin(bs.animTimer*0.5)*6;}
    if(bs.animPhase==='enemy_attack'){enY+=Math.sin(bs.animTimer*0.5)*3;}
    if(enSpr)ui.drawSprite(enSpr,enX,enY);
    if(bs.enemy.currentHp<bs.enemy.hp){
      ui.drawHPBar(SCREEN_W/2-40,40,80,bs.enemy.currentHp,bs.enemy.hp,C.RED);
    }
    ui.drawText(bs.enemy.name,SCREEN_W/2-ui.getTextWidth(bs.enemy.name,2)/2,20,C.WHITE,2);
    ui.createWindow(0,SCREEN_H-140,SCREEN_W,140,C.WHITE,C.BLACK);
    ui.drawText(bs.enemy.name+' HP:'+bs.enemy.currentHp+'/'+bs.enemy.hp,10,SCREEN_H-132,C.WHITE,2);
    ui.drawHPBar(10,SCREEN_H-115,200,bs.enemy.currentHp,bs.enemy.hp,C.RED);
    ui.drawText('HP:'+bs.playerHp+'/'+bs.playerMaxHp,10,SCREEN_H-95,C.WHITE,2);
    ui.drawHPBar(10,SCREEN_H-78,150,bs.playerHp,bs.playerMaxHp,C.GREEN);
    ui.drawText('MP:'+bs.playerMp+'/'+bs.playerMaxMp,170,SCREEN_H-95,C.BLUE,2);
    ui.drawHPBar(170,SCREEN_H-78,100,bs.playerMp,bs.playerMaxMp,C.BLUE);
    if(bs.phase==='player_turn'||bs.subMenu!==null){
      if(bs.subMenu===null){
        const opts=['Attack','Skill','Item','Defend','Flee'];
        ui.drawMenu(opts,10,SCREEN_H-60,bs.subMenuIdx);
      }else if(bs.subMenu==='skill'){
        for(let i=0;i<bs.playerSkills.length;i++){
          const sk=mod('data').getSkill(bs.playerSkills[i]);
          if(!sk)continue;
          const col=i===bs.subMenuIdx?C.YELLOW:C.WHITE;
          if(i===bs.subMenuIdx)ui.drawText('>',10,SCREEN_H-60+i*16,C.YELLOW,2);
          ui.drawText(sk.name+' MP:'+sk.mpCost,26,SCREEN_H-60+i*16,col,2);
        }
      }else if(bs.subMenu==='item'){
        const cons=bs.playerInventory.filter(id=>{const it=mod('data').getItem(id);return it&&it.type==='consumable';});
        for(let i=0;i<cons.length;i++){
          const it=mod('data').getItem(cons[i]);
          if(!it)continue;
          const col=i===bs.subMenuIdx?C.YELLOW:C.WHITE;
          if(i===bs.subMenuIdx)ui.drawText('>',10,SCREEN_H-60+i*16,C.YELLOW,2);
          ui.drawText(it.name,26,SCREEN_H-60+i*16,col,2);
        }
        if(cons.length===0)ui.drawText('No items!',26,SCREEN_H-60,C.GRAY,2);
      }
    }
    if(bs.messageTimer>0){
      ui.createWindow(220,SCREEN_H-70,400,24,C.WHITE,C.BLACK);
      ui.drawText(bs.message,230,SCREEN_H-64,C.WHITE,2);
    }
  }

  function renderShop(){
    const ui=mod('ui');const ch=mod('character').getState();
    renderMap();
    ui.createWindow(40,30,SCREEN_W-80,SCREEN_H-60,C.WHITE,C.BLACK);
    ui.drawText('SHOP',SCREEN_W/2-ui.getTextWidth('SHOP',3)/2,40,C.YELLOW,3);
    const mode=mod('shop').getMode();
    ui.drawText(mode==='buy'?'[BUY]':'[SELL]',60,75,mode==='buy'?C.YELLOW:C.GRAY,2);
    ui.drawText('Gold:'+ch.gold,SCREEN_W-200,75,C.YELLOW,2);
    if(mode==='buy'){
      const items=mod('shop').getShopItemsList();
      const si=mod('shop').getSelected();
      for(let i=0;i<items.length;i++){
        const it=mod('data').getItem(items[i]);if(!it)continue;
        const col=i===si?C.YELLOW:C.WHITE;
        const y=95+i*18;
        if(i===si)ui.drawText('>',60,y,C.YELLOW);
        ui.drawText(it.name,75,y,col,2);
        ui.drawText(it.price+'G',250,y,col,2);
        ui.drawText(it.desc,330,y,C.LGRAY,1);
      }
    }else{
      const inv=ch.inventory;
      const si=mod('shop').getSelected();
      for(let i=0;i<inv.length;i++){
        const it=mod('data').getItem(inv[i]);if(!it)continue;
        const col=i===si?C.YELLOW:C.WHITE;
        const y=95+i*18;
        if(i===si)ui.drawText('>',60,y,C.YELLOW);
        ui.drawText(it.name,75,y,col,2);
        ui.drawText(Math.floor(it.price*0.5)+'G',250,y,col,2);
      }
      if(inv.length===0)ui.drawText('Nothing to sell',75,95,C.GRAY,2);
    }
    const msg=mod('shop').getMsg();
    if(msg)ui.drawText(msg,60,SCREEN_H-80,C.YELLOW,2);
    ui.drawText('Tab:Switch  Esc:Close',60,SCREEN_H-50,C.GRAY,1);
  }

  function renderMenu(){
    const ui=mod('ui');const ch=mod('character').getState();
    renderMap();
    ui.createWindow(80,40,SCREEN_W-160,SCREEN_H-80,C.WHITE,C.BLACK);
    if(menuState==='main'){
      ui.drawText('MENU',SCREEN_W/2-ui.getTextWidth('MENU',3)/2,50,C.YELLOW,3);
      const opts=['Status','Inventory','Save','Equip','Close'];
      ui.drawMenu(opts,110,90,menuSelIdx);
    }else if(menuState==='status'){
      ui.drawText('STATUS',SCREEN_W/2-ui.getTextWidth('STATUS',3)/2,50,C.YELLOW,3);
      ui.drawText('Name: '+ch.name,110,90,C.WHITE,2);
      ui.drawText('Level: '+ch.level,110,108,C.WHITE,2);
      ui.drawText('EXP: '+ch.exp+'/'+mod('character').expForLevel(ch.level),110,126,C.WHITE,2);
      ui.drawText('HP: '+ch.hp+'/'+ch.maxHp,110,144,C.GREEN,2);
      ui.drawText('MP: '+ch.mp+'/'+ch.maxMp,110,162,C.BLUE,2);
      ui.drawText('ATK: '+ch.atk,110,180,C.RED,2);
      ui.drawText('DEF: '+ch.def,110,198,C.LBLUE,2);
      ui.drawText('SPD: '+ch.spd,110,216,C.LGRAY,2);
      ui.drawText('MAG: '+ch.mag,110,234,C.PURPLE,2);
      ui.drawText('Gold: '+ch.gold,110,252,C.YELLOW,2);
      ui.drawText('Esc:Back',110,SCREEN_H-70,C.GRAY,1);
    }else if(menuState==='inventory'){
      ui.drawText('INVENTORY',SCREEN_W/2-ui.getTextWidth('INVENTORY',2)/2,50,C.YELLOW,2);
      for(let i=0;i<ch.inventory.length;i++){
        const it=mod('data').getItem(ch.inventory[i]);if(!it)continue;
        const col=i===menuSelIdx?C.YELLOW:C.WHITE;
        if(i===menuSelIdx)ui.drawText('>',110,80+i*16,C.YELLOW);
        ui.drawText(it.name+' - '+it.desc,125,80+i*16,col,1);
      }
      if(ch.inventory.length===0)ui.drawText('Empty!',125,80,C.GRAY,1);
      ui.drawText('Enter:Use/Equip  Esc:Back',110,SCREEN_H-70,C.GRAY,1);
    }else if(menuState==='equip'){
      ui.drawText('EQUIP',SCREEN_W/2-ui.getTextWidth('EQUIP',3)/2,50,C.YELLOW,3);
      const wn=ch.equipped.weapon?mod('data').getItem(ch.equipped.weapon).name:'None';
      const an=ch.equipped.armor?mod('data').getItem(ch.equipped.armor).name:'None';
      ui.drawText('Weapon: '+wn,110,100,C.WHITE,2);
      ui.drawText('Armor: '+an,110,120,C.WHITE,2);
      ui.drawText('Esc:Back',110,SCREEN_H-70,C.GRAY,1);
    }
  }

  function renderEvaluation(){
    const ui=mod('ui');const ed=mod('evaluation').getData();
    if(!ed)return;
    ui.fillRect(0,0,SCREEN_W,SCREEN_H,C.BLACK);
    ui.createWindow(80,30,SCREEN_W-160,SCREEN_H-60,C.YELLOW,C.BLACK);
    ui.drawText('BATTLE RESULTS',SCREEN_W/2-ui.getTextWidth('BATTLE RESULTS',3)/2,45,C.YELLOW,3);
    const gradeCol=ed.grade==='S'?C.YELLOW:ed.grade==='A'?C.GREEN:ed.grade==='B'?C.LBLUE:ed.grade==='C'?C.ORANGE:C.RED;
    ui.drawText('Grade: '+ed.grade,SCREEN_W/2-ui.getTextWidth('Grade: '+ed.grade,4)/2,90,gradeCol,4);
    ui.drawText('Score: '+ed.score+'/100',130,140,C.WHITE,2);
    if(mod('evaluation').isShowingDetails()){
      ui.drawText('HP Left: '+Math.floor(ed.details.hpRatio*100)+'%',130,165,C.GREEN,2);
      ui.drawText('Turns: '+ed.details.turnCount,130,183,C.LBLUE,2);
      ui.drawText('Used Item: '+(ed.details.usedItem?'Yes':'No'),130,201,C.ORANGE,2);
      ui.drawText('Critical: '+(ed.details.hadCrit?'Yes':'No'),130,219,C.YELLOW,2);
      ui.drawText('EXP +'+ed.details.exp,130,237,C.GREEN,2);
      ui.drawText('Gold +'+ed.details.gold,130,255,C.YELLOW,2);
    }else{
      ui.drawText('Press D for details',130,165,C.GRAY,2);
      ui.drawText('EXP +'+ed.details.exp+'  Gold +'+ed.details.gold,130,185,C.WHITE,2);
    }
    const btn1=mod('evaluation').getSelectedBtn()===0;
    const btn2=mod('evaluation').getSelectedBtn()===1;
    ui.createWindow(120,280,180,30,btn1?C.YELLOW:C.WHITE,C.BLACK);
    ui.drawText('Retry',160,288,btn1?C.YELLOW:C.WHITE,2);
    ui.createWindow(340,280,180,30,btn2?C.YELLOW:C.WHITE,C.BLACK);
    ui.drawText('Return Map',360,288,btn2?C.YELLOW:C.WHITE,2);
  }

  function renderGameOver(){
    const ui=mod('ui');
    ui.fillRect(0,0,SCREEN_W,SCREEN_H,C.BLACK);
    ui.drawText('GAME OVER',SCREEN_W/2-ui.getTextWidth('GAME OVER',4)/2,120,C.RED,4);
    const opts=['Try Again','Title Screen'];
    for(let i=0;i<opts.length;i++){
      const col=i===menuIdx?C.WHITE:C.GRAY;
      if(i===menuIdx)ui.drawText('>',SCREEN_W/2-ui.getTextWidth(opts[i],2)/2-20,220+i*30,C.YELLOW,2);
      ui.drawText(opts[i],SCREEN_W/2-ui.getTextWidth(opts[i],2)/2,220+i*30,col,2);
    }
  }

  return{init};
});

window.addEventListener('load',function(){mod('game').init();});
window.addEventListener('click',function(){mod('audio').resumeContext();},{once:true});
window.addEventListener('keydown',function(){mod('audio').resumeContext();},{once:true});
</script>
</body>
</html>
